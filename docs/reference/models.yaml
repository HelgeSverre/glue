    adapter: openai
    enabled: true
    base_url: https://api.openai.com/v1
    docs_url: https://platform.openai.com/docs/
    auth:
      api_key: env:OPENAI_API_KEY
    models:
      gpt-5.5:
        name: GPT-5.5
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 400000
        speed: standard
        cost: high
        notes: Frontier general-purpose and agentic coding model.
      gpt-5.4:
        name: GPT-5.4
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 400000
        speed: standard
        cost: high
        notes: Prior frontier model — kept for pinned configs.
      gpt-5.4-mini:
        name: GPT-5.4 Mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        speed: fast
        cost: low
        notes: Default small_model candidate.
      o3:
        name: o3
        recommended: true
        capabilities: [chat, tools, json, reasoning, coding]
        context_window: 200000
        speed: slower
        cost: high
        notes: Reasoning-specialized flagship. State of the art on Codeforces / SWE-bench / MMMU; use for hard debugging, proofs, and multi-step planning.
      o4-mini:
        name: o4-mini
        recommended: true
        capabilities: [chat, tools, json, reasoning, coding]
        context_window: 200000
        speed: fast
