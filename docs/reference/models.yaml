      gpt-5.5:
        name: GPT-5.5 (via Copilot)
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1050000
        max_output_tokens: 128000
        speed: standard
        cost: subscription
        notes: Uses your GitHub Copilot subscription.
      gpt-5.3-codex:
        name: GPT-5.3 Codex (via Copilot)
        recommended: true
        capabilities: [chat, tools, json, coding]
        context_window: 400000
        max_output_tokens: 128000
        speed: fast
        cost: subscription
        notes: OpenAI's agentic coding model via Copilot subscription.
      gemini-2.5-pro:
        name: Gemini 2.5 Pro (via Copilot)
        recommended: false
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        speed: standard
        cost: subscription
        notes: Google option via Copilot subscription.

  openrouter:
    name: OpenRouter
    adapter: openai
    compatibility: openrouter
    enabled: false
    base_url: https://openrouter.ai/api/v1
    docs_url: https://openrouter.ai/docs/
    auth:
      api_key: env:OPENROUTER_API_KEY
    request_headers:
      HTTP-Referer: https://getglue.dev
      X-Title: Glue
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6 via OpenRouter
        api_id: anthropic/claude-sonnet-4.6
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: provider_routed
        notes: Useful when users want one router key.
      gpt-5.4-mini:
        name: GPT-5.4 Mini via OpenRouter
        api_id: openai/gpt-5.4-mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        speed: fast
        cost: provider_routed
        notes: Small-model fallback through a router.
      gemini-3.5-flash:
        name: Gemini 3.5 Flash via OpenRouter
        api_id: google/gemini-3.5-flash
        recommended: true
        capabilities: [chat, tools, vision, files, json, browser]
        context_window: 1000000
        speed: fast
        cost: provider_routed
        notes: Good for research and extraction workflows.

  local-vllm:
    name: Local vLLM
    adapter: openai
    compatibility: vllm
    enabled: false
    base_url: http://localhost:8000/v1
    auth:
      api_key: none
    models:
      local-model:
        name: Local Model
        recommended: false
        capabilities: [chat, json, local]
        context_window: null
        speed: depends_on_hardware
        cost: local
        notes: Rename this entry to the model served by vLLM, LM Studio, or another local gateway.

profiles:
  coding:
    description: Default interactive coding session.
    recommended:
      - anthropic/claude-opus-4-7
      - anthropic/claude-sonnet-4-6
      - openai/gpt-5.5
      - openai/o3
      - mistral/devstral-latest
      - groq/llama-4-scout-17b-16e-instruct
  cheap:
    description: Low-cost summaries, titles, and quick checks.
    recommended:
      - openai/gpt-5.4-mini
      - openai/gpt-5.4-nano
      - anthropic/claude-haiku-4-5
      - gemini/gemini-3.5-flash
      - mistral/mistral-small-latest
  local:
    description: No hosted provider call.
    recommended:
      - ollama/qwen3-coder:30b
      - ollama/qwen3-coder-next:latest
      - ollama/qwen3.6:35b
      - ollama/gemma4:26b
      - ollama/devstral:24b
      - ollama/qwen3:8b
      - local-vllm/local-model
  research:
    description: Browser, scraping, long context, and extraction tasks.
    recommended:
      - gemini/gemini-3.5-flash
      - gemini/gemini-3.1-pro-preview
      - openai/gpt-5.4-mini
      - anthropic/claude-sonnet-4-6
  reasoning:
    description: Hard problems that benefit from explicit long-chain thinking.
    recommended:
      - openai/o3
      - openai/gpt-5.5-pro
      - anthropic/claude-opus-4-7
      - mistral/magistral-medium-latest
      - groq/gpt-oss-120b
