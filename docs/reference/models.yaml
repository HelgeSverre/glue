        notes: Top-tier Anthropic model via Copilot subscription.
      claude-opus-4-6:
        name: Claude Opus 4.6 (via Copilot)
        recommended: false
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 128000
        speed: slower
        cost: subscription
