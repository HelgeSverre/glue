# Glue model catalog reference.
#
# This file is intentionally a catalog, not a credentials file.
# API keys should live in env vars, ~/.glue/credentials.json, or an OS keychain
# layer later. Keep this file safe to commit.
#
# Naming rule:
# - provider keys are local Glue provider IDs
# - model keys are provider-native model IDs
# - selected model IDs are always provider/model, for example:
#   anthropic/claude-sonnet-4-6
#
# OpenAI-compatible endpoints should use adapter: openai. That means "speak
# the OpenAI API wire format", not "this provider is OpenAI".

version: 1
updated_at: 2026-05-20

defaults:
  model: anthropic/claude-sonnet-4-6
  small_model: openai/gpt-5.4-mini
  local_model: ollama/qwen3-coder:30b

catalog:
  source: bundled
  refresh: manual # never | manual | daily | startup
  remote_url: null
  cache_path: ~/.glue/cache/models.yaml
  local_overrides: ~/.glue/models.yaml
  merge_order:
    - bundled
    - cached_remote
    - local_overrides
  fallback: bundled

selection:
  hide_disabled_providers: true
  hide_unavailable_credentials: false
  show_experimental: false
  default_filter:
    capabilities:
      - chat
      - tools
  sort:
    - recommended
    - provider
    - speed
    - name

capabilities:
  chat: Text chat.
  streaming: Incremental token streaming.
  tools: Tool calling or function calling.
  parallel_tools: Parallel tool-call execution in a single turn.
  vision: Image input.
  files: File upload or file reference support.
  json: Structured JSON output.
  reasoning: Explicit reasoning effort or thinking controls.
  coding: Strong code generation and code review behavior.
  local: Runs locally or on a user-controlled endpoint.
  browser: Suitable for browser/research workflows.
  binary_tool_results: Accepts binary or multimodal tool-result payloads.

providers:
  anthropic:
    name: Anthropic
    adapter: anthropic
    enabled: true
    docs_url: https://docs.anthropic.com/
    auth:
      api_key: env:ANTHROPIC_API_KEY
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: high
        notes: Default high-quality coding model.
      claude-haiku-4-5:
        name: Claude Haiku 4.5
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 200000
        max_output_tokens: 64000
        speed: fast
        cost: low
        notes: Good small_model candidate for titles, summaries, and quick checks.
      claude-opus-4-7:
        name: Claude Opus 4.7
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 128000
        speed: slower
        cost: premium
        notes: Most capable Claude model — agentic coding and long-horizon work.

  openai:
    name: OpenAI
    adapter: openai
    enabled: true
    base_url: https://api.openai.com/v1
    docs_url: https://platform.openai.com/docs/
    auth:
      api_key: env:OPENAI_API_KEY
    models:
      gpt-5.5:
        name: GPT-5.5
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1050000
        max_output_tokens: 128000
        speed: standard
        cost: high
        notes: Frontier general-purpose and agentic coding model.
      gpt-5.5-pro:
        name: GPT-5.5 Pro
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1050000
        max_output_tokens: 128000
        speed: slower
        cost: premium
        notes: High-compute reasoning variant. Use for hard architecture, proofs, and long-horizon planning.
      gpt-5.4:
        name: GPT-5.4
        recommended: false
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1050000
        max_output_tokens: 128000
        speed: standard
        cost: high
        notes: Prior frontier model — kept for pinned configs.
      gpt-5.4-mini:
        name: GPT-5.4 Mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        max_output_tokens: 128000
        speed: fast
        cost: low
        notes: Default small_model candidate.
      gpt-5.4-nano:
        name: GPT-5.4 Nano
        recommended: true
        capabilities: [chat, tools, json, coding]
        context_window: 400000
        max_output_tokens: 128000
        speed: fast
        cost: low
        notes: Cheapest GPT-5.4-class model for high-volume tasks.
      o3:
        name: o3
        recommended: true
        capabilities: [chat, tools, json, reasoning, coding]
        context_window: 200000
        speed: slower
        cost: high
        notes: Reasoning-specialized flagship. Use for hard debugging, proofs, and multi-step planning.

  gemini:
    name: Google Gemini
    adapter: gemini
    enabled: true
    docs_url: https://ai.google.dev/
    auth:
      api_key: env:GEMINI_API_KEY
    models:
      gemini-3.5-flash:
        name: Gemini 3.5 Flash
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding, browser]
        context_window: 1000000
        max_output_tokens: 65536
        speed: fast
        cost: low
        notes: GA Flash (May 2026). Most intelligent Flash-tier model for agentic and coding tasks. Supports Google Search grounding.
      gemini-3.1-pro-preview:
        name: Gemini 3.1 Pro Preview
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding, browser]
        context_window: 1000000
        max_output_tokens: 65536
        speed: standard
        cost: medium
        notes: Pro-class preview. Strongest Gemini model for complex reasoning, coding, and research. Supports Google Search grounding.
      gemini-3-flash-preview:
        name: Gemini 3 Flash Preview
        recommended: true
        capabilities: [chat, tools, vision, files, json, coding]
        context_window: 1000000
        max_output_tokens: 65536
        speed: fast
        cost: low
        notes: Fast, balanced, multimodal preview. Strong agentic-coding candidate.
      gemini-3.1-flash-lite:
        name: Gemini 3.1 Flash-Lite
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 1000000
        max_output_tokens: 65536
        speed: fast
        cost: low
        notes: GA Flash-Lite (May 2026). Cost-efficient, fastest performance for high-frequency, lightweight tasks.
      deep-research-preview-04-2026:
        name: Deep Research Preview (Apr 2026)
        recommended: false
        enabled: false
        capabilities: [chat, reasoning, tools, browser]
        context_window: 1000000
        max_output_tokens: 65536
        speed: slower
        cost: high
        notes: Fast Deep Research agent — interactive use. Requires background runner (not yet wired up in Glue).
      deep-research-max-preview-04-2026:
        name: Deep Research Max Preview (Apr 2026)
        recommended: false
        enabled: false
        capabilities: [chat, reasoning, tools, browser]
        context_window: 1000000
        max_output_tokens: 65536
        speed: slower
        cost: high
        notes: Maximum-comprehensiveness Deep Research agent. Requires background runner (not yet wired up in Glue).

  mistral:
    name: Mistral AI
    adapter: openai
    compatibility: mistral
    enabled: true
    base_url: https://api.mistral.ai/v1
    docs_url: https://docs.mistral.ai/
    auth:
      api_key: env:MISTRAL_API_KEY
    models:
      devstral-latest:
        name: Devstral Latest
        recommended: true
        default: true
        capabilities: [chat, tools, json, coding]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Mistral's agentic coding model. Strong tool use.
      mistral-large-latest:
        name: Mistral Large Latest
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Flagship multimodal general-purpose model.
      mistral-small-latest:
        name: Mistral Small Latest
        recommended: true
        capabilities: [chat, tools, vision, json, reasoning, coding]
        context_window: 262000
        speed: fast
        cost: low
        notes: Unified reasoning + coding + vision (Small 4, March 2026). Strong small-model default; cheaper than Medium with better agentic behavior.
      magistral-medium-latest:
        name: Magistral Medium Latest
        recommended: true
        capabilities: [chat, tools, json, reasoning]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Pure reasoning model. Use when you need explicit long-chain thinking; not a general chat pick.
      mistral-medium-latest:
        name: Mistral Medium Latest
        recommended: true
        capabilities: [chat, tools, vision, json]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Mistral Medium 3.5 (April 2026). Mid-tier general-purpose; multimodal with tool use.

  groq:
    name: Groq
    adapter: openai
    compatibility: groq
    enabled: true
    base_url: https://api.groq.com/openai/v1
    docs_url: https://console.groq.com/docs/
    auth:
      api_key: env:GROQ_API_KEY
    models:
      llama-4-scout-17b-16e-instruct:
        name: Llama 4 Scout (17B active / 109B MoE)
        api_id: meta-llama/llama-4-scout-17b-16e-instruct
        recommended: true
        default: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 128000
        speed: fast
        cost: low
        notes: Native multimodal MoE in production on Groq. Strong speed/quality default as of 2026-04.
      gpt-oss-120b:
        name: GPT-OSS 120B
        api_id: openai/gpt-oss-120b
        recommended: true
        capabilities: [chat, tools, json, reasoning, coding]
        context_window: 131072
        speed: fast
        cost: low
        notes: OpenAI's open-weight reasoning + coding model. 120B weights at Groq speed.
      gpt-oss-20b:
        name: GPT-OSS 20B
        api_id: openai/gpt-oss-20b
        recommended: true
        capabilities: [chat, tools, json, coding]
        context_window: 131072
        speed: fast
        cost: low
        notes: Coding-optimized, faster/cheaper than 120B.

  ollama:
    name: Ollama
    adapter: ollama
    enabled: true
    base_url: http://localhost:11434
    docs_url: https://ollama.com/
    auth:
      api_key: none
    models:
      qwen3-coder:30b:
        name: Qwen3 Coder 30B (MoE)
        recommended: true
        default: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Consensus local coding agent. 30B/3.3B MoE. ~20 GB VRAM at Q4_K_M.
      qwen3-coder-next:latest:
        name: Qwen3 Coder Next (MoE)
        recommended: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: 2026-04 flagship local coder. Qwen3-Next-80B-A3B; ~52 GB at Q4_K_M, ~85 GB at Q8_0. Needs a workstation GPU or 64 GB+ Mac.
      qwen3.6:35b:
        name: Qwen3.6 35B
        recommended: true
        capabilities: [chat, tools, vision, json, reasoning, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Latest Qwen generalist with agentic coding upgrades. Vision + thinking + tools. ~24 GB at Q4_K_M.
      gemma4:26b:
        name: Gemma 4 26B
        recommended: true
        capabilities: [chat, tools, vision, json, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Google's latest with native function-calling. Multimodal, 256K context. ~18 GB at Q4_K_M.
      devstral:24b:
        name: Devstral 24B
        recommended: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 128000
        speed: depends_on_hardware
        cost: local
        notes: Mistral's agentic coding model. ~14 GB at Q4_K_M.
      qwen2.5-coder:32b:
        name: Qwen2.5 Coder 32B
        recommended: false
        capabilities: [chat, tools, json, coding, local]
        context_window: 32768
        speed: depends_on_hardware
        cost: local
        notes: Previous-generation safe fallback. Prefer qwen3-coder:30b.
      qwen3:8b:
        name: Qwen3 8B
        recommended: true
        capabilities: [chat, tools, json, local]
        context_window: 128000
        speed: depends_on_hardware
        cost: local
        notes: Low-end floor for tool use. ~5 GB at Q4_K_M. Fits a 16 GB laptop.

  copilot:
