  openrouter:
    name: OpenRouter
    adapter: openai
    compatibility: openrouter
    enabled: false
    base_url: https://openrouter.ai/api/v1
    docs_url: https://openrouter.ai/docs/
    auth:
      api_key: env:OPENROUTER_API_KEY
    request_headers:
      HTTP-Referer: https://getglue.dev
      X-Title: Glue
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6 via OpenRouter
        api_id: anthropic/claude-sonnet-4-6
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: provider_routed
        notes: Useful when users want one router key.
      gpt-5.4-mini:
        name: GPT-5.4 Mini via OpenRouter
        api_id: openai/gpt-5.4-mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        speed: fast
        cost: provider_routed
        notes: Small-model fallback through a router.
      gemini-flash-latest:
        name: Gemini Flash Latest via OpenRouter
        api_id: google/gemini-flash-latest
        recommended: true
        capabilities: [chat, tools, vision, files, json, browser]
        context_window: 1000000
        speed: fast
        cost: provider_routed
        notes: Good for research and extraction workflows.

