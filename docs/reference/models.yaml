# Glue model catalog reference.
#
# This file is intentionally a catalog, not a credentials file.
# API keys should live in env vars, ~/.glue/credentials.json, or an OS keychain
# layer later. Keep this file safe to commit.
#
# Naming rule:
# - provider keys are local Glue provider IDs
# - model keys are provider-native model IDs
# - selected model IDs are always provider/model, for example:
#   anthropic/claude-sonnet-4-6
#
# OpenAI-compatible endpoints should use adapter: openai. That means "speak
# the OpenAI API wire format", not "this provider is OpenAI".

version: 1
updated_at: 2026-04-20

defaults:
  model: anthropic/claude-sonnet-4-6
  small_model: openai/gpt-5.4-mini
  local_model: ollama/qwen2.5-coder:32b

catalog:
  source: bundled
  refresh: manual # never | manual | daily | startup
  remote_url: null
  cache_path: ~/.glue/cache/models.yaml
  local_overrides: ~/.glue/models.yaml
  merge_order:
    - bundled
    - cached_remote
    - local_overrides
  fallback: bundled

selection:
  hide_disabled_providers: true
  hide_unavailable_credentials: false
  show_experimental: false
  default_filter:
    capabilities:
      - chat
      - tools
  sort:
    - recommended
    - provider
    - speed
    - name

capabilities:
  chat: Text chat.
  streaming: Incremental token streaming.
  tools: Tool calling or function calling.
  parallel_tools: Parallel tool-call execution in a single turn.
  vision: Image input.
  files: File upload or file reference support.
  json: Structured JSON output.
  reasoning: Explicit reasoning effort or thinking controls.
  coding: Strong code generation and code review behavior.
  local: Runs locally or on a user-controlled endpoint.
  browser: Suitable for browser/research workflows.
  binary_tool_results: Accepts binary or multimodal tool-result payloads.

providers:
  anthropic:
    name: Anthropic
    adapter: anthropic
    enabled: true
    docs_url: https://docs.anthropic.com/
    auth:
      api_key: env:ANTHROPIC_API_KEY
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: high
        notes: Default high-quality coding model.
      claude-opus-4-6:
        name: Claude Opus 4.6
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 128000
        speed: slower
        cost: premium
        notes: Use for difficult architecture, debugging, and long investigations.
      claude-haiku-4-5:
        name: Claude Haiku 4.5
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 200000
        max_output_tokens: 64000
        speed: fast
        cost: low
        notes: Good small_model candidate for titles, summaries, and quick checks.
      claude-opus-4-7:
        name: Claude Opus 4.7
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 128000
        speed: slower
        cost: premium
        notes: Most capable Claude model — agentic coding and long-horizon work.

  openai:
    name: OpenAI
    adapter: openai
    enabled: true
    base_url: https://api.openai.com/v1
    docs_url: https://platform.openai.com/docs/
    auth:
      api_key: env:OPENAI_API_KEY
    models:
      gpt-5.4:
        name: GPT-5.4
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 400000
        speed: standard
        cost: high
        notes: Frontier general-purpose and agentic coding model.
      gpt-5.4-mini:
        name: GPT-5.4 Mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        speed: fast
        cost: low
        notes: Default small_model candidate.
      gpt-5.2:
        name: GPT-5.2
        recommended: false
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 400000
        speed: standard
        cost: high
        notes: Keep visible only if users still rely on it.

  gemini:
    name: Google Gemini
    adapter: gemini
    enabled: true
    docs_url: https://ai.google.dev/
    auth:
      api_key: env:GEMINI_API_KEY
    models:
      gemini-pro-latest:
        name: Gemini Pro Latest
        recommended: true
        default: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        speed: standard
        cost: medium
        notes: Stable alias for the current Pro-class Gemini model.
      gemini-flash-latest:
        name: Gemini Flash Latest
        recommended: true
        capabilities: [chat, tools, vision, files, json, coding]
        context_window: 1000000
        speed: fast
        cost: low
        notes: Fast model for summarization, extraction, and browser-heavy work.

  mistral:
    name: Mistral AI
    adapter: openai
    compatibility: mistral
    enabled: true
    base_url: https://api.mistral.ai/v1
    docs_url: https://docs.mistral.ai/
    auth:
      api_key: env:MISTRAL_API_KEY
    models:
      devstral-latest:
        name: Devstral Latest
        recommended: true
        default: true
        capabilities: [chat, tools, json, coding]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Mistral's agentic coding model. Strong tool use.
      mistral-large-latest:
        name: Mistral Large Latest
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 262000
        speed: standard
        cost: medium
        notes: Flagship multimodal general-purpose model.
      mistral-medium-latest:
        name: Mistral Medium Latest
        recommended: true
        capabilities: [chat, tools, vision, json]
        context_window: 128000
        speed: standard
        cost: medium
        notes: Balanced cost/quality option.
      mistral-small-latest:
        name: Mistral Small Latest
        recommended: true
        capabilities: [chat, tools, vision, json, reasoning]
        context_window: 262000
        speed: fast
        cost: low
        notes: Fast with reasoning toggle; good for quick tasks.

  groq:
    name: Groq
    adapter: openai
    compatibility: groq
    enabled: true
    base_url: https://api.groq.com/openai/v1
    docs_url: https://console.groq.com/docs/
    auth:
      api_key: env:GROQ_API_KEY
    models:
      gpt-oss-120b:
        name: GPT-OSS 120B
        api_id: openai/gpt-oss-120b
        recommended: true
        default: true
        capabilities: [chat, tools, json, reasoning, coding]
        context_window: 131072
        speed: fast
        cost: low
        notes: Groq's flagship reasoning + coding model. 120B weights at Groq speed.
      gpt-oss-20b:
        name: GPT-OSS 20B
        api_id: openai/gpt-oss-20b
        recommended: true
        capabilities: [chat, tools, json, coding]
        context_window: 131072
        speed: fast
        cost: low
        notes: Coding-optimized, faster/cheaper than 120B.
      llama-3.3-70b-versatile:
        name: Llama 3.3 70B Versatile
        recommended: true
        capabilities: [chat, tools, json]
        context_window: 131072
        speed: fast
        cost: low
        notes: General-purpose alternative. No reasoning mode.
      llama-3.1-8b-instant:
        name: Llama 3.1 8B Instant
        recommended: false
        capabilities: [chat, tools, json]
        context_window: 131072
        speed: fast
        cost: low
        notes: 8B floor. Fast but tool-loop fragile; use for summaries/titles, not the main agent.

  ollama:
    name: Ollama
    adapter: openai
    compatibility: ollama
    enabled: true
    base_url: http://localhost:11434/v1
    docs_url: https://ollama.com/
    auth:
      api_key: none
    models:
      qwen3-coder:30b:
        name: Qwen3 Coder 30B (MoE)
        recommended: true
        default: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Consensus local coding agent. 30B/3.3B MoE. ~20 GB VRAM at Q4_K_M.
      qwen3.6:35b:
        name: Qwen3.6 35B
        recommended: true
        capabilities: [chat, tools, vision, json, reasoning, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Latest Qwen generalist with agentic coding upgrades. Vision + thinking + tools. ~24 GB at Q4_K_M.
      gemma4:26b:
        name: Gemma 4 26B
        recommended: true
        capabilities: [chat, tools, vision, json, coding, local]
        context_window: 256000
        speed: depends_on_hardware
        cost: local
        notes: Google's latest with native function-calling. Multimodal, 256K context. ~18 GB at Q4_K_M.
      devstral-small-2:24b:
        name: Devstral Small 2 24B
        recommended: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 128000
        speed: depends_on_hardware
        cost: local
        notes: Mistral's agentic coding model (Dec 2025). 68% SWE-bench. ~14 GB at Q4_K_M.
      qwen2.5-coder:32b:
        name: Qwen2.5 Coder 32B
        recommended: true
        capabilities: [chat, tools, json, coding, local]
        context_window: 32768
        speed: depends_on_hardware
        cost: local
        notes: Aider-verified 73.7% (GPT-4o class). Safe fallback.
      qwen3:8b:
        name: Qwen3 8B
        recommended: true
        capabilities: [chat, tools, json, local]
        context_window: 128000
        speed: depends_on_hardware
        cost: local
        notes: Low-end floor for tool use. ~5 GB at Q4_K_M. Fits a 16 GB laptop.
      mistral:7b:
        name: Mistral 7B
        recommended: false
        capabilities: [chat, tools, json, local]
        context_window: 32768
        speed: depends_on_hardware
        cost: local
        notes: General-purpose, not code-specialized. Tool use works but weaker than Qwen3-Coder.
      gemma3:12b:
        name: Gemma 3 12B
        recommended: false
        capabilities: [chat, json, local]
        context_window: 131072
        speed: depends_on_hardware
        cost: local
        notes: No tools capability; superseded by Gemma 4. Use gemma4:26b instead.
      codellama:13b:
        name: CodeLlama 13B
        recommended: false
        capabilities: [chat, json, coding, local]
        context_window: 16384
        speed: depends_on_hardware
        cost: local
        notes: FIM-lineage code model. Narrates instead of calling tools. Not for agent use.
      codegemma:7b:
        name: CodeGemma 7B
        recommended: false
        capabilities: [chat, json, coding, local]
        context_window: 8192
        speed: depends_on_hardware
        cost: local
        notes: FIM-trained (80% FIM rate). Not designed for agent tool use.
      starcoder2:15b:
        name: StarCoder2 15B
        recommended: false
        capabilities: [chat, json, coding, local]
        context_window: 16384
        speed: depends_on_hardware
        cost: local
        notes: FIM-lineage (BigCode). Code completion, not agent tool use.
      deepseek-coder:33b:
        name: DeepSeek Coder 33B
        recommended: false
        capabilities: [chat, json, coding, local]
        context_window: 16384
        speed: depends_on_hardware
        cost: local
        notes: Legacy DeepSeek code model (no tools). Use qwen3-coder or devstral-small-2 instead.

  copilot:
    name: GitHub Copilot
    adapter: copilot
    enabled: true
    base_url: https://api.githubcopilot.com
    docs_url: https://docs.github.com/copilot
    auth:
      kind: oauth
      help_url: https://github.com/login/device
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6 (via Copilot)
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: subscription
        notes: Uses your GitHub Copilot subscription.
      gpt-4.1:
        name: GPT-4.1 (via Copilot)
        recommended: true
        capabilities: [chat, tools, json, coding]
        context_window: 128000
        speed: standard
        cost: subscription
        notes: Uses your GitHub Copilot subscription.

  openrouter:
    name: OpenRouter
    adapter: openai
    compatibility: openrouter
    enabled: false
    base_url: https://openrouter.ai/api/v1
    docs_url: https://openrouter.ai/docs/
    auth:
      api_key: env:OPENROUTER_API_KEY
    request_headers:
      HTTP-Referer: https://getglue.dev
      X-Title: Glue
    models:
      claude-sonnet-4-6:
        name: Claude Sonnet 4.6 via OpenRouter
        api_id: anthropic/claude-sonnet-4-6
        recommended: true
        capabilities: [chat, tools, vision, files, json, reasoning, coding]
        context_window: 1000000
        max_output_tokens: 64000
        speed: standard
        cost: provider_routed
        notes: Useful when users want one router key.
      gpt-5.4-mini:
        name: GPT-5.4 Mini via OpenRouter
        api_id: openai/gpt-5.4-mini
        recommended: true
        capabilities: [chat, tools, vision, json, coding]
        context_window: 400000
        speed: fast
        cost: provider_routed
        notes: Small-model fallback through a router.
      gemini-flash-latest:
        name: Gemini Flash Latest via OpenRouter
        api_id: google/gemini-flash-latest
        recommended: true
        capabilities: [chat, tools, vision, files, json, browser]
        context_window: 1000000
        speed: fast
        cost: provider_routed
        notes: Good for research and extraction workflows.

  local-vllm:
    name: Local vLLM
    adapter: openai
    compatibility: vllm
    enabled: false
    base_url: http://localhost:8000/v1
    auth:
      api_key: none
    models:
      local-model:
        name: Local Model
        recommended: false
        capabilities: [chat, json, local]
        context_window: null
        speed: depends_on_hardware
        cost: local
        notes: Rename this entry to the model served by vLLM, LM Studio, or another local gateway.

profiles:
  coding:
    description: Default interactive coding session.
    recommended:
      - anthropic/claude-opus-4-7
      - anthropic/claude-sonnet-4-6
      - openai/gpt-5.4
      - mistral/devstral-latest
      - groq/gpt-oss-120b
  cheap:
    description: Low-cost summaries, titles, and quick checks.
    recommended:
      - openai/gpt-5.4-mini
      - anthropic/claude-haiku-4-5
      - gemini/gemini-flash-latest
      - mistral/mistral-small-latest
  local:
    description: No hosted provider call.
    recommended:
      - ollama/qwen3-coder:30b
      - ollama/devstral-small-2:24b
      - ollama/qwen3:8b
      - local-vllm/local-model
  research:
    description: Browser, scraping, long context, and extraction tasks.
    recommended:
      - gemini/gemini-flash-latest
      - gemini/gemini-pro-latest
      - openai/gpt-5.4-mini
      - anthropic/claude-sonnet-4-6
