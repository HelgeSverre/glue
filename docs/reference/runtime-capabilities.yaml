# Glue runtime capability matrix.
#
# Canonical source of truth for the /runtimes page and the RuntimeMatrix
# component. Each capability value is one of:
#   yes      — supported today
#   partial  — supported but rough, incomplete, or behind a flag
#   planned  — not yet implemented; tracked by runtime boundary plan
#   no       — not supported and not planned
#
# When adding a runtime, also add an entry to feature-status.yaml.

version: 2
updated_at: 2026-05-18

capabilities:
  command_capture: Run a command and capture its stdout/stderr/exit code.
  command_streaming: Stream output back to the TUI as it happens.
  background_jobs: Start long-running processes that outlive one tool call.
  filesystem_read: Read files the agent has access to.
  filesystem_write: Write or edit files the agent has access to.
  mount_host_paths: Mount local directories into the runtime.
  browser_cdp: Run a headless browser reachable by the agent.
  artifacts: Produce files the user can retrieve after the session.
  secrets: Provide per-runtime secret storage separate from the host.
  snapshots: Snapshot and restore runtime state between sessions.
  internet: Outbound internet access from inside the runtime.
  gpu: Access to GPU devices.

runtimes:
  host:
    status: shipping
    notes: Runs in the user's shell on the user's machine.
    capabilities:
      command_capture: yes
      command_streaming: yes
      background_jobs: yes
      filesystem_read: yes
      filesystem_write: yes
      mount_host_paths: yes
      browser_cdp: partial
      artifacts: yes
      secrets: no
      snapshots: no
      internet: yes
      gpu: yes

  docker:
    status: shipping
    notes: Ephemeral container with the workspace mounted; sandbox polish is experimental.
    capabilities:
      command_capture: yes
      command_streaming: yes
      background_jobs: partial
      filesystem_read: yes
      filesystem_write: yes
      mount_host_paths: yes
      browser_cdp: partial
      artifacts: yes
      secrets: no
      snapshots: no
      internet: yes
      gpu: partial

  daytona:
    status: shipping
    notes: Remote Daytona sandbox over REST; workspace bootstrapped via git clone or tarball into /workspace.
    capabilities:
      command_capture: yes
      command_streaming: yes
      background_jobs: yes
      filesystem_read: yes
      filesystem_write: yes
      mount_host_paths: no
      browser_cdp: planned
      artifacts: planned
      secrets: no
      snapshots: yes
      internet: yes
      gpu: planned

  sprites:
    status: shipping
    notes: Persistent Fly.io sprite via the `sprite` CLI; auto-sleeps when idle, resumes by name.
    capabilities:
      command_capture: yes
      command_streaming: yes
      background_jobs: yes
      filesystem_read: yes
      filesystem_write: yes
      mount_host_paths: no
      browser_cdp: planned
      artifacts: planned
      secrets: no
      snapshots: yes
      internet: yes
      gpu: planned

  modal:
    status: shipping
    notes: Modal sandbox via an embedded Python sidecar over JSON-RPC; sandbox auto-terminates on the configured timeout.
    capabilities:
      command_capture: yes
      command_streaming: yes
      background_jobs: yes
      filesystem_read: yes
      filesystem_write: yes
      mount_host_paths: no
      browser_cdp: planned
      artifacts: planned
      secrets: no
      snapshots: no
      internet: yes
      gpu: planned
