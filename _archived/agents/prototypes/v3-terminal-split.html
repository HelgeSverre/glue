<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glue — Terminal Split</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FACC15;--gold:#EAB308;--amber:#F59E0B;
  --bg:#030304;--surface:#0c0c0e;--surface-el:#141416;
  --border:#222228;--border-br:#333338;
  --text:#d4d4d8;--text-sec:#8a8a95;--text-mut:#4a4a55;--text-yel:#FDE047;
  --success:#22C55E;--error:#EF4444;--warning:#F59E0B;--info:#3B82F6;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5}

/* Noise texture overlay */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.top-bar{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--surface-el);border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px;white-space:nowrap}
.top-bar .brand{color:var(--yellow);font-weight:700}
.top-bar .stats{color:var(--text-mut)}
.top-bar .hints{color:var(--text-mut);font-size:11px}
.middle{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:8px 0;font-size:12px;user-select:none}
.main-area{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:0;overflow:hidden}
.bottom-bar{height:26px;display:flex;align-items:center;padding:0 12px;background:var(--surface-el);border-top:1px solid var(--border);flex-shrink:0;font-size:11px;white-space:nowrap;gap:4px;justify-content:space-between}
.bottom-bar .tabs{display:flex;gap:2px}
.bottom-bar .tab{padding:0 8px;color:var(--text-mut)}
.bottom-bar .tab.active{color:var(--yellow)}
.bottom-bar .tab .num{color:var(--text-mut)}
.bottom-bar .tab.active .num{color:var(--yellow)}
.bottom-bar .tokens{color:var(--text-mut)}

/* Sidebar tree */
.tree-line{padding:1px 8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6}
.tree-line:hover{background:rgba(250,204,21,0.04)}
.tree-line.selected{color:var(--yellow)}
.tree-toggle{cursor:pointer;display:inline}
.tree-prefix{color:var(--text-mut)}
.status-running{color:var(--success)}
.status-idle{color:var(--text-mut)}
.status-waiting{color:var(--warning)}
.status-error{color:var(--error)}
.status-done{color:var(--success)}
.project-name{color:var(--text);font-weight:500}
.branch-name{color:var(--text-sec)}
.agent-label{color:var(--text-sec)}

/* Terminal Panes */
.pane{display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);position:relative;background:var(--bg)}
.pane.focused{border-color:var(--yellow)}
.pane-title{height:24px;display:flex;align-items:center;padding:0 8px;background:var(--surface);font-size:11px;color:var(--text-mut);flex-shrink:0;border-bottom:1px solid var(--border);gap:4px;white-space:nowrap;overflow:hidden}
.pane.focused .pane-title{color:var(--text-sec)}
.pane-title .status-dot{margin-left:auto}
.pane-body{flex:1;overflow-y:auto;padding:8px 10px;position:relative;font-size:12px;line-height:1.6}

/* Scanline overlay */
.pane-body::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  z-index:1}

/* Text glow */
.pane-body{text-shadow:0 0 4px rgba(250,204,21,0.12)}
.pane-body .cmd{color:var(--yellow);font-weight:500}
.pane-body .comment{color:var(--text-sec)}
.pane-body .success{color:var(--success)}
.pane-body .err{color:var(--error)}
.pane-body .muted{color:var(--text-mut)}
.pane-body .warn{color:var(--warning)}
.pane-body .info-c{color:var(--info)}
.pane-body .file-block{border-left:2px solid var(--border-br);padding-left:8px;margin:4px 0}
.pane-body .keyword{color:var(--info)}
.pane-body .string-lit{color:var(--success)}
.pane-body .type-lit{color:var(--amber)}

/* Blinking cursor */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor-block{display:inline-block;width:8px;height:15px;background:var(--yellow);animation:blink 1s step-end infinite;vertical-align:text-bottom}

/* Pulsing approval */
@keyframes pulse-amber{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse-amber{color:var(--warning);animation:pulse-amber 1.5s ease-in-out infinite;font-weight:700}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-br);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--text-mut)}
</style>
</head>
<body>
<div class="app" x-data="glueApp()">

  <!-- Top Bar -->
  <div class="top-bar">
    <span><span class="brand">glue ❯</span></span>
    <span class="stats">4 projects · 8 agents · 4 running · 1 awaiting · &nbsp;21,234 tok</span>
    <span class="hints">ctrl+1-4 switch · ctrl+n new</span>
  </div>

  <!-- Middle: Sidebar + Panes -->
  <div class="middle">

    <!-- Sidebar Tree -->
    <div class="sidebar">
      <template x-for="(proj, pi) in projects" :key="pi">
        <div>
          <!-- Project line -->
          <div class="tree-line" :class="{'selected': selectedAgent && false}" @click="proj.open = !proj.open">
            <span class="tree-toggle" x-text="proj.open ? '▾' : '▸'"></span>
            <span class="project-name" x-text="proj.name"></span>
          </div>
          <!-- Branches -->
          <template x-if="proj.open">
            <div>
              <template x-for="(br, bi) in proj.branches" :key="bi">
                <div>
                  <div class="tree-line" @click="br.open = !br.open">
                    <span class="tree-prefix" x-text="bi < proj.branches.length - 1 ? '│ ' : '  '"></span>
                    <span class="tree-toggle" x-text="br.open ? '▾' : '▸'"></span>
                    <span class="branch-name" x-text="br.name"></span>
                  </div>
                  <!-- Agents under branch -->
                  <template x-if="br.open && br.agents.length > 0">
                    <div>
                      <template x-for="(ag, ai) in br.agents" :key="ai">
                        <div class="tree-line"
                             :class="{'selected': selectedAgent === ag.id}"
                             @click="assignAgentToPane(ag.id)">
                          <span class="tree-prefix" x-text="(bi < proj.branches.length - 1 ? '│ ' : '  ') + (ai < br.agents.length - 1 ? '├── ' : '└── ')"></span>
                          <span :class="'status-' + ag.statusClass" x-text="ag.icon"></span>
                          <span class="agent-label" x-text="'#' + ag.id + ' ' + ag.label"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- Main 2x2 Panes -->
    <div class="main-area">
      <template x-for="(paneIdx, i) in paneSlots" :key="i">
        <div class="pane" :class="{'focused': focusedPane === i}" @click="focusedPane = i">
          <div class="pane-title">
            <span x-text="'─── Agent #' + agents[paneIdx].id + ' · ' + agents[paneIdx].branch + ' · ' + agents[paneIdx].model + ' ───'"></span>
            <span class="status-dot" :class="'status-' + agents[paneIdx].statusClass" x-text="'[' + agents[paneIdx].icon + ']'"></span>
          </div>
          <div class="pane-body" x-html="agents[paneIdx].html"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="tabs">
      <template x-for="(paneIdx, i) in paneSlots" :key="i">
        <span class="tab" :class="{'active': focusedPane === i}">
          <span class="num" x-text="'[' + (i+1) + ']'"></span>
          <span x-text="' #' + agents[paneIdx].id + ' ' + agents[paneIdx].shortName"></span>
        </span>
      </template>
    </div>
    <div class="tokens">
      <span x-text="paneSlots.map(p => agents[p].tokens.toLocaleString()).join(' + ') + ' = ' + paneSlots.reduce((s,p) => s + agents[p].tokens, 0).toLocaleString() + ' tok'"></span>
    </div>
  </div>

</div>

<script>
function glueApp() {
  const agentContents = {
    1: `<span class="cmd">❯ Implementing virtual screen buffer...</span>

  Reading <span class="info-c">lib/src/terminal/terminal.dart</span>
  <span class="success">✓</span> <span class="muted">156 lines</span>

  <span class="comment">The current implementation uses direct stdout writes.
  I'll create a Cell-based buffer system.</span>

  <span class="muted">┌</span> <span class="warn">write_file</span>
  <span class="muted">│</span> <span class="info-c">lib/src/terminal/screen_buffer.dart</span>
  <span class="muted">└</span> Creating...

  <span class="keyword">class</span> <span class="type-lit">Cell</span> {
    <span class="type-lit">String</span> char;
    <span class="type-lit">AnsiStyle</span>? style;
    <span class="type-lit">Cell</span>(<span class="keyword">this</span>.char, {<span class="keyword">this</span>.style});
  }

  <span class="keyword">class</span> <span class="type-lit">ScreenBuffer</span> {
    <span class="keyword">final</span> <span class="type-lit">Terminal</span> _terminal;
    <span class="keyword">late</span> <span class="type-lit">List</span>&lt;<span class="type-lit">List</span>&lt;<span class="type-lit">Cell</span>&gt;&gt; _current;`,

    2: `<span class="cmd">❯ Adding MCP server discovery...</span>

  Scanning <span class="info-c">.glue/mcp.json</span> for server configs...

  Found 2 servers:
    <span class="success">•</span> filesystem <span class="muted">(stdio)</span>
    <span class="success">•</span> github <span class="muted">(sse)</span>

  <span class="comment">Implementing MCP protocol handshake...</span>`,

    3: `<span class="cmd">❯ Fixing UTF-8 multi-byte parsing...</span>

  <span class="muted">┌</span> <span class="warn">bash</span>
  <span class="muted">│</span> <span class="info-c">dart analyze lib/</span>
  <span class="muted">└</span> <span class="pulse-amber">⏳ AWAITING APPROVAL</span>

  <span class="muted">[Press 'a' to approve, 'd' to deny]</span>`,

    5: `<span class="cmd">❯ Refactoring ANSI escape parser...</span>

  <span class="muted">┌</span> <span class="warn">bash</span>
  <span class="muted">│</span> <span class="info-c">dart test test/ansi_test.dart</span>
  <span class="muted">└</span> <span class="err">✗ 3 tests failed</span>

  <span class="err">Expected: "\\x1b[38;2;255;0;0m"
  Actual:   "\\x1b[31m"</span>`,

    6: `<span class="cmd">❯ Implementing JWT auth middleware...</span>

  Reading <span class="info-c">src/middleware/auth.ts</span>
  <span class="success">✓</span> <span class="muted">89 lines</span>

  <span class="comment">Adding token validation and refresh logic.</span>

  <span class="muted">┌</span> <span class="warn">write_file</span>
  <span class="muted">│</span> <span class="info-c">src/middleware/jwt.ts</span>
  <span class="muted">└</span> <span class="success">✓</span> Created (62 lines)`,

    7: `<span class="cmd">❯ Setting up GraphQL schema...</span>

  Reading <span class="info-c">src/schema/types.graphql</span>
  <span class="success">✓</span> <span class="muted">134 lines</span>

  Generating resolvers for Query type...`,

    8: `<span class="cmd">❯ Creating K8s deployment manifests...</span>

  <span class="muted">┌</span> <span class="warn">read_file</span>
  <span class="muted">│</span> <span class="info-c">k8s/base/deployment.yaml</span>
  <span class="muted">└</span> <span class="success">✓</span> <span class="muted">45 lines</span>

  <span class="comment">Adding HorizontalPodAutoscaler with:</span>
    minReplicas: <span class="string-lit">2</span>
    maxReplicas: <span class="string-lit">10</span>
    targetCPUUtilization: <span class="string-lit">70%</span>

  <span class="muted">┌</span> <span class="warn">write_file</span>
  <span class="muted">│</span> <span class="info-c">k8s/overlays/prod/hpa.yaml</span>
  <span class="muted">└</span> <span class="success">✓</span> Created (28 lines)`,
  };

  // Streaming text for agent 2
  const streamExtra = `

  <span class="muted">┌</span> <span class="warn">write_file</span>
  <span class="muted">│</span> <span class="info-c">lib/src/mcp/discovery.dart</span>
  <span class="muted">└</span> Creating...

  <span class="keyword">class</span> <span class="type-lit">McpDiscovery</span> {
    <span class="keyword">final</span> <span class="type-lit">Map</span>&lt;<span class="type-lit">String</span>, <span class="type-lit">ServerConfig</span>&gt; _servers;

    <span class="keyword">Future</span>&lt;<span class="keyword">void</span>&gt; discover() <span class="keyword">async</span> {
      <span class="keyword">final</span> configFile = <span class="keyword">await</span> File(<span class="string-lit">'.glue/mcp.json'</span>).readAsString();
      <span class="keyword">final</span> parsed = jsonDecode(configFile);
      <span class="keyword">for</span> (<span class="keyword">final</span> entry <span class="keyword">in</span> parsed[<span class="string-lit">'servers'</span>]) {
        _servers[entry[<span class="string-lit">'name'</span>]] = <span class="type-lit">ServerConfig</span>.fromJson(entry);
      }
    }
  }`;

  // Strip HTML tags for character-by-character streaming
  const streamChars = streamExtra;
  let streamPos = 0;
  let streamBaseHtml = agentContents[2];

  return {
    focusedPane: 0,
    selectedAgent: null,
    // paneSlots maps pane index -> agent id
    paneSlots: [1, 7, 3, 8],
    agents: {
      1:  { id: 1, branch: 'feat/tui-overhaul', model: 'claude-4-sonnet', shortName: 'tui-overhaul', statusClass: 'running', icon: '●', tokens: 4521, html: agentContents[1] },
      2:  { id: 2, branch: 'feat/mcp-support', model: 'claude-4-sonnet', shortName: 'mcp-support', statusClass: 'running', icon: '●', tokens: 1892, html: agentContents[2] + '<span class="cursor-block"></span>' },
      3:  { id: 3, branch: 'fix/input-parsing', model: 'claude-4-sonnet', shortName: 'input-parsing', statusClass: 'waiting', icon: '⏳', tokens: 3107, html: agentContents[3] },
      5:  { id: 5, branch: 'feat/tui-overhaul', model: 'claude-4-sonnet', shortName: 'tui-overhaul', statusClass: 'error', icon: '✗', tokens: 2891, html: agentContents[5] },
      6:  { id: 6, branch: 'feat/auth', model: 'claude-4-sonnet', shortName: 'auth', statusClass: 'running', icon: '●', tokens: 2034, html: agentContents[6] },
      7:  { id: 7, branch: 'feat/graphql', model: 'claude-4-sonnet', shortName: 'graphql', statusClass: 'running', icon: '●', tokens: 1567, html: agentContents[7] + '<span class="cursor-block"></span>' },
      8:  { id: 8, branch: 'feat/k8s-deploy', model: 'claude-4-sonnet', shortName: 'k8s-deploy', statusClass: 'running', icon: '●', tokens: 3654, html: agentContents[8] },
    },
    projects: [
      {
        name: 'glue-cli', open: true,
        branches: [
          { name: 'main', open: false, agents: [{ id: 'idle', icon: '◌', statusClass: 'idle', label: 'idle' }] },
          { name: 'feat/tui-overhaul', open: true, agents: [
            { id: 1, icon: '●', statusClass: 'running', label: 'running' },
            { id: 5, icon: '✗', statusClass: 'error', label: 'error' },
          ]},
          { name: 'feat/mcp-support', open: false, agents: [{ id: 2, icon: '●', statusClass: 'running', label: 'running' }] },
          { name: 'fix/input-parsing', open: true, agents: [
            { id: 3, icon: '⏳', statusClass: 'waiting', label: 'approval' },
          ]},
        ]
      },
      {
        name: 'api-server', open: true,
        branches: [
          { name: 'main', open: false, agents: [] },
          { name: 'feat/auth', open: true, agents: [
            { id: 6, icon: '●', statusClass: 'running', label: 'running' },
          ]},
          { name: 'feat/graphql', open: true, agents: [
            { id: 7, icon: '●', statusClass: 'running', label: 'streaming' },
          ]},
        ]
      },
      {
        name: 'docs-site', open: false,
        branches: []
      },
      {
        name: 'infra', open: true,
        branches: [
          { name: 'main', open: false, agents: [] },
          { name: 'feat/k8s-deploy', open: true, agents: [
            { id: 8, icon: '●', statusClass: 'running', label: 'running' },
          ]},
        ]
      },
    ],

    assignAgentToPane(agentId) {
      if (agentId === 'idle') return;
      if (!this.agents[agentId]) return;
      this.selectedAgent = agentId;
      this.paneSlots[this.focusedPane] = agentId;
    },

    init() {
      // Simulate streaming for agent 2
      let streamingHtml = '';
      let idx = 0;
      const rawText = streamChars;
      const interval = setInterval(() => {
        if (idx >= rawText.length) {
          clearInterval(interval);
          return;
        }
        // Handle HTML tags: if we hit '<', find the closing '>' and append the whole tag at once
        if (rawText[idx] === '<') {
          const closeIdx = rawText.indexOf('>', idx);
          if (closeIdx !== -1) {
            streamingHtml += rawText.substring(idx, closeIdx + 1);
            idx = closeIdx + 1;
          } else {
            streamingHtml += rawText[idx];
            idx++;
          }
        } else if (rawText[idx] === '&') {
          // Handle HTML entities
          const semiIdx = rawText.indexOf(';', idx);
          if (semiIdx !== -1 && semiIdx - idx < 10) {
            streamingHtml += rawText.substring(idx, semiIdx + 1);
            idx = semiIdx + 1;
          } else {
            streamingHtml += rawText[idx];
            idx++;
          }
        } else {
          streamingHtml += rawText[idx];
          idx++;
        }
        this.agents[2].html = agentContents[2] + streamingHtml + '<span class="cursor-block"></span>';
        // Also update agent 7 if visible (it also has streaming cursor)
      }, 40);

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key >= '1' && e.key <= '4') {
          e.preventDefault();
          this.focusedPane = parseInt(e.key) - 1;
        }
      });
    }
  };
}
</script>
</body>
</html>
