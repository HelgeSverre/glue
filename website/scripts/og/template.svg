<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0A0A0B; }
      .grid-line { stroke: #18181A; stroke-width: 1; }
      .accent { fill: #FACC15; }
      .fg { fill: #E6E6E6; }
      .fg-dim { fill: #A0A3A8; }
      .fg-3 { fill: #6B6F76; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }
      .sans { font-family: 'Inter', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif; }
      .eyebrow { font-size: 22px; letter-spacing: 2.5px; }
      .headline { font-size: {{HEADLINE_SIZE}}px; font-weight: 600; letter-spacing: -2px; }
      .subtitle { font-size: 26px; font-weight: 400; }
      .tag { font-size: 20px; letter-spacing: 1.5px; }
      .foot-label { font-size: 20px; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Subtle top/bottom rules -->
  <g opacity="0.5">
    <line class="grid-line" x1="0" y1="105" x2="1200" y2="105"/>
    <line class="grid-line" x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 135)">
    <circle class="accent" cx="6" cy="-8" r="6"/>
    <text class="mono fg-3 eyebrow" x="22" y="0">{{EYEBROW}}</text>
  </g>

  <!-- Headline (1–3 lines) -->
  <text class="sans fg headline">{{HEADLINE_TSPANS}}</text>

  <!-- Subtitle (optional, up to 2 lines) -->
  <text class="sans fg-dim subtitle">{{SUBTITLE_TSPANS}}</text>

  <!-- Foot strip: install + identity -->
  <g transform="translate(80, 555)">
    <text class="mono fg-dim foot-label" x="0" y="0">curl -fsSL https://getglue.dev/install.sh | sh</text>
  </g>

  <g transform="translate(1120, 555)" text-anchor="end">
    <text class="mono accent tag" x="0" y="0">GetGlue.dev</text>
  </g>
</svg>
