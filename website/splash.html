<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glue — The coding agent that holds it all together</title>
    <meta name="description" content="Open source CLI coding agent. Multi-model. Multi-worktree. Built in Dart.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --yellow: #FACC15;
            --gold: #EAB308;
            --black: #0A0A0B;
            --dark: #1a1a1a;
            --gray: #71717A;
            --gray-light: #a1a1aa;
            --white: #fafafa;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding: 48px 24px;
        }

        .container {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2em;
            text-align: center;
        }

        .symbol {
            width: 64px;
            height: 64px;
        }

        .wordmark {
            font-family: var(--mono);
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--white);
            text-transform: lowercase;
        }

        .tagline {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 600;
            color: var(--yellow);
            margin-bottom: 12px;
        }

        .description {
            font-size: 16px;
            color: var(--gray-light);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .install-block {
            background: #111113;
            border: 2px solid #252528;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .install-block:hover {
            border-color: var(--yellow);
        }

        .install-block code {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--white);
            white-space: nowrap;
        }

        .install-block .copy-hint {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .install-block:hover .copy-hint {
            color: var(--yellow);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border: 2px solid;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--yellow);
            color: var(--black);
            border-color: var(--yellow);
        }

        .btn-primary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0 var(--yellow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--white);
            border-color: #333;
        }

        .btn-ghost:hover {
            border-color: var(--yellow);
            color: var(--yellow);
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0 #333;
        }

        .domain {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 48px;
            letter-spacing: 0.04em;
        }

        .tape {
            background: repeating-linear-gradient(
                    -45deg,
                    var(--black), var(--black) 10px,
                    var(--yellow) 10px, var(--yellow) 20px
            );
            height: 6px;
            width: 100%;
            max-width: 560px;
            margin-bottom: 24px;
        }

        .footer {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--gray);
        }

        .footer a {
            color: var(--gray);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--yellow);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @media (max-width: 480px) {
            .wordmark {
                font-size: 48px;
            }

            .tagline {
                font-size: 16px;
            }

            .install-block {
                padding: 12px 16px;
            }

            .install-block code {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <!-- Symbol -->
        <svg class="symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
            <path d="M32 4 C32 4, 52 24, 52 36 C52 48, 43.3 58, 32 58 C20.7 58, 12 48, 12 36 C12 24, 32 4, 32 4Z"
                  fill="#FACC15"/>
        </svg>

        <!-- Wordmark -->
        <div class="wordmark">glue</div>
    </div>
    <!-- Tagline -->
    <div class="tagline">The coding agent that holds it all together.</div>

    <!-- Description -->
    <p class="description">
        Open source CLI coding agent. Multi-model. Multi-worktree. Built in Dart.
    </p>

    <!-- Install command -->
    <div class="install-block" onclick="copyInstall()" id="install-block">
        <code>cd glue/cli && just install</code>
        <span class="copy-hint" id="copy-hint">copy</span>
    </div>

    <!-- CTAs -->
    <div class="btn-row">
        <a href="https://github.com/HelgeSverre/glue" class="btn btn-primary">Star on GitHub</a>
        <a href="https://github.com/HelgeSverre/glue" class="btn btn-ghost">View Source</a>
    </div>

    <!-- Domain -->
    <div class="domain">getglue.dev</div>

    <!-- Tape -->
    <div class="tape"></div>

    <!-- Footer -->
    <div class="footer">
        MIT License · <a href="https://github.com/HelgeSverre">Helge Sverre</a>
    </div>
</div>

<script>
    function copyInstall() {
        navigator.clipboard.writeText('cd glue/cli && just install').then(() => {
            const hint = document.getElementById('copy-hint');
            hint.textContent = 'copied!';
            hint.style.color = '#22C55E';
            setTimeout(() => {
                hint.textContent = 'copy';
                hint.style.color = '';
            }, 2000);
        });
    }
</script>
</body>
</html>
