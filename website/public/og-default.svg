<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0A0A0B; }
      .panel { fill: #0F0F10; stroke: #222326; stroke-width: 1; }
      .grid-line { stroke: #18181A; stroke-width: 1; }
      .accent { fill: #FACC15; }
      .fg { fill: #E6E6E6; }
      .fg-dim { fill: #A0A3A8; }
      .fg-3 { fill: #6B6F76; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
      .eyebrow { font-size: 22px; letter-spacing: 2.5px; text-transform: uppercase; }
      .headline { font-size: 90px; font-weight: 600; letter-spacing: -3px; }
      .tag { font-size: 20px; letter-spacing: 1.5px; }
      .foot-label { font-size: 20px; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Subtle grid -->
  <g opacity="0.5">
    <line class="grid-line" x1="0" y1="105" x2="1200" y2="105"/>
    <line class="grid-line" x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 135)">
    <circle class="accent" cx="6" cy="-8" r="6"/>
    <text class="mono fg-3 eyebrow" x="22" y="0">GLUE · TERMINAL-NATIVE CODING AGENT</text>
  </g>

  <!-- Headline -->
  <text class="sans fg headline" x="80" y="290">A small terminal agent</text>
  <text class="sans fg headline" x="80" y="390">
    for <tspan class="accent">real coding work.</tspan>
  </text>

  <!-- Illustrative transcript panel (top-right corner) -->
  <g transform="translate(820, 155)">
    <rect class="panel" x="0" y="0" width="300" height="210" rx="8"/>

    <!-- header strip -->
    <line class="grid-line" x1="0" y1="32" x2="300" y2="32"/>
    <text class="mono fg-3" x="14" y="22" font-size="11">~/code/glue</text>
    <text class="mono fg-3" x="260" y="22" font-size="11">main</text>

    <!-- transcript lines -->
    <g class="mono" font-size="12">
      <text class="accent" x="14" y="58">›</text>
      <text class="fg" x="34" y="58">explain retry logic</text>

      <text class="accent" x="14" y="82" opacity="0.7">⏵</text>
      <text class="fg-dim" x="34" y="82">read  http_client.dart</text>

      <text class="accent" x="14" y="102" opacity="0.7">⏵</text>
      <text class="fg-dim" x="34" y="102">grep  retry  test/</text>

      <text class="fg-3" x="34" y="122">3 matches</text>

      <text class="fg" x="14" y="146">· Exponential backoff</text>
      <text class="fg" x="14" y="162">  with jitter, capped 5.</text>

      <text class="accent" x="14" y="186">›</text>
      <text class="fg" x="34" y="186">add retry for ECONNRESET</text>
    </g>
  </g>

  <!-- Foot strip: install + identity -->
  <g transform="translate(80, 555)">
    <text class="mono fg-dim foot-label" x="0" y="0">curl -fsSL https://getglue.dev/install.sh | sh</text>
  </g>

  <g transform="translate(1120, 555)" text-anchor="end">
    <text class="mono accent tag" x="0" y="0">GETGLUE.DEV</text>
  </g>
</svg>
