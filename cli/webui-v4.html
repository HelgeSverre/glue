    },
    renderBashFrame(command, output) {
      const cols = 72;
      const cw = cols - 4;
      const legend = ' ' + this.escHtml(command) + ' ';
      const topFill = Math.max(0, cols - 2 - legend.length);
      const top = '<span class="bash-border">┌─</span><span class="bash-legend">' + legend + '</span><span class="bash-border">' + '─'.repeat(topFill) + '┐</span>';
      const bot = '<span class="bash-border">└' + '─'.repeat(cols - 2) + '┘</span>';
      const lines = output ? output.split('\n') : [];
      const maxLines = 50;
      const truncated = lines.length > maxLines;
      const visible = truncated ? lines.slice(lines.length - maxLines) : lines;
      let content = '';
      if (truncated) {
        const notice = '… (' + (lines.length - maxLines) + ' lines above)';
        const pad = Math.max(0, cw - notice.length);
        content += '<span class="bash-border">│</span> <span class="bash-notice">' + this.escHtml(notice) + '</span>' + ' '.repeat(pad) + ' <span class="bash-border">│</span>\n';
      }
      for (const line of visible) {
        const display = line.length > cw ? line.substring(0, cw - 1) + '…' : line;
        const pad = Math.max(0, cw - display.length);
        content += '<span class="bash-border">│</span> <span class="bash-content">' + this.escHtml(display) + '</span>' + ' '.repeat(pad) + ' <span class="bash-border">│</span>\n';
      }
      if (!content) {
        content = '<span class="bash-border">│</span>' + ' '.repeat(cols - 2) + '<span class="bash-border">│</span>\n';
      }
      return top + '\n' + content + bot;
    },
    escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    },
    renderMd(text) {
      if (!text) return '';
      const lines = text.split('\n');
      const out = [];
      let inCode = false;
      let codeLang = null;
      const codeLines = [];

      for (const line of lines) {
        if (line.trimStart().startsWith('```')) {
          if (!inCode) {
            inCode = true;
            codeLang = line.trimStart().substring(3).trim() || null;
            continue;
          } else {
            out.push(this.renderCodeFrame(codeLines, codeLang));
            codeLines.length = 0;
            inCode = false;
            codeLang = null;
            continue;
          }
        }
        if (inCode) { codeLines.push(line); continue; }

        // Headings
        if (line.startsWith('### ')) { out.push('<div class="md__h">' + this.renderInline(line.substring(4)) + '</div>'); continue; }
        if (line.startsWith('## ')) { out.push('<div class="md__h">' + this.renderInline(line.substring(3)) + '</div>'); continue; }
        if (line.startsWith('# ')) { out.push('<div class="md__h">' + this.renderInline(line.substring(2)) + '</div>'); continue; }
        // Blockquote
        if (line.startsWith('> ')) { out.push('<div class="md__quote"><span class="md__quotebar">│</span> ' + this.renderInline(line.substring(2)) + '</div>'); continue; }
        // Unordered list
        const ulm = line.match(/^(\s*)[-*] (.*)/);
        if (ulm) { out.push('<div class="md__li">' + ulm[1] + '<span class="md__bullet">•</span> ' + this.renderInline(ulm[2]) + '</div>'); continue; }
        // Ordered list
        const olm = line.match(/^(\s*)(\d+)\. (.*)/);
        if (olm) { out.push('<div class="md__li">' + olm[1] + '<span class="md__bullet">' + this.escHtml(olm[2]) + '.</span> ' + this.renderInline(olm[3]) + '</div>'); continue; }
        // Empty / paragraph
        if (!line) { out.push(''); continue; }
        out.push(this.renderInline(line));
      }
      if (inCode && codeLines.length) { out.push(this.renderCodeFrame(codeLines, codeLang)); }
      return out.join('\n');
    },
    renderInline(text) {
      let s = this.escHtml(text);
      // Inline code (protect from further processing)
      const segs = [];
      let rest = s;
      while (true) {
        const m = rest.match(/`(.+?)`/);
        if (!m) break;
        segs.push(this.renderInlineSegment(rest.substring(0, m.index)));
        segs.push('<span class="md__code">' + m[1] + '</span>');
        rest = rest.substring(m.index + m[0].length);
      }
      segs.push(this.renderInlineSegment(rest));
      return segs.join('');
    },
    renderInlineSegment(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<span class="md__bold">$1</span>')
        .replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<span class="md__italic">$1</span>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '$1 <span class="md__link-url">($2)</span>');
    },
    renderCodeFrame(lines, lang) {
      const cols = 68;
      const cw = cols - 4;
      const label = lang ? ' ' + this.escHtml(lang) + ' ' : '';
      const hfill = Math.max(0, cols - 2 - label.length);
      let html = '<pre class="md__codeframe">';
      html += '<span class="cf-border">╭─</span>' + (label ? '<span class="cf-lang">' + label + '</span>' : '') + '<span class="cf-border">' + '─'.repeat(hfill) + '╮</span>\n';
      for (const line of lines) {
        const display = line.length > cw ? this.escHtml(line.substring(0, cw - 1)) + '…' : this.escHtml(line);
        const vis = line.length > cw ? cw : line.length;
        const pad = Math.max(0, cw - vis);
        html += '<span class="cf-border">│</span> <span class="cf-line">' + display + '</span>' + ' '.repeat(pad) + ' <span class="cf-border">│</span>\n';
      }
      html += '<span class="cf-border">╰' + '─'.repeat(cols - 2) + '╯</span>';
      html += '</pre>';
      return html;
    },

    formatTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'm';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    },
    copyText(text) { navigator.clipboard?.writeText(text); },
    copyWithFeedback(text, field) {
      navigator.clipboard?.writeText(text);
      this.copiedField = field;
      setTimeout(() => { if (this.copiedField === field) this.copiedField = null; }, 1500);
    },
    switchTo(id) { this.activeId = id; this.outputSticky = true; this.scrollOutputToEnd(); },
    effectiveBranchPrefix() {
      const repo = this.repos.find(r => r.path === (this.modal?.form?.repoPath || this.activeProjectFilter));
      return repo?.overrides?.branchPrefix ?? this.config.globalDefaults.branchPrefix ?? 'glue/';
    },

    // ── Actions ──
    // ── Settings resolution ──
    effectiveSettings(repoPath) {
      const repo = this.repos.find(r => r.path === repoPath);
      return { ...this.config.globalDefaults, ...(repo?.overrides ?? {}) };
    },

    openModal(kind) {
      this.modal.kind = kind;
      this.modal.open = true;
      if (kind === 'wizard') {
        this.modal.step = 1;
        this.modal.repoMode = false;
        this.modal.form.repoPath = this.activeProjectFilter === '__all__' ? this.repos[0]?.path : this.activeProjectFilter;
        const eff = this.effectiveSettings(this.modal.form.repoPath);
        this.modal.form.wsMode = eff.wsMode;
        this.modal.form.existingWt = '';
        this.modal.form.generatedName = generateName();
        this.modal.form.baseBranch = eff.baseBranch;
        this.modal.form.provider = eff.provider;
        this.modal.form.model = eff.model;
        if (!this.modelsFor(this.modal.form.provider).includes(this.modal.form.model)) {
          this.modal.form.model = this.modelsFor(this.modal.form.provider)[0];
        }
        this.modal.form.prompt = '';
        this.modal.form.addName = '';
        this.modal.form.createBranch = false;
        this.modal.form.branchName = '';
      }
      if (kind === 'settings') {
        this.settingsRepoPath = this.activeProjectFilter === '__all__' ? this.repos[0]?.path : this.activeProjectFilter;
      }
    },

    openWizardAddRepo() {
      this.openModal('wizard');
      this.modal.repoMode = true;
      this.fbInit();
    },

    createSession() {
      const f = this.modal.form;
      let branch = null, tempName = f.generatedName, worktreePath = null;
      if (f.wsMode === 'new-worktree') {
        worktreePath = f.repoPath + '/.worktrees/' + f.generatedName;
        this.worktrees.push({ repo: f.repoPath, branch: f.generatedName, path: '.worktrees/' + f.generatedName });
      } else if (f.wsMode === 'existing-worktree') {
        tempName = f.existingWt.split('/').pop();
      } else {
        tempName = f.generatedName;
      }
      if (f.createBranch) {
        branch = f.branchName || (this.effectiveBranchPrefix() + f.generatedName);
      }
      const id = 'S-' + (nextId++).toString(16).padStart(2, '0');
      const w = {
        id, project: f.repoPath, worktreePath, branch, tempName,
        title: null, renameProposal: null,
        model: f.model, provider: f.provider,
        alive: true, archived: false, time: 'now', tokens: 0,
        vcs: branch ? {
          git: { hasUncommittedChanges: false, localCommitsAhead: 0, hasUpstream: false, remoteBranchExists: false, isMerged: false },
          pr: { exists: false, url: null, number: null, status: 'none', checks: { state: 'not_run' } },
        } : null,
        blocks: f.prompt
          ? [{ type: 'user', text: f.prompt }, { type: 'assistant', text: 'Looking at your project...', streaming: true }]
          : [],
      };
      this.sessions.push(w);
      if (this.activeProjectFilter !== '__all__') this.activeProjectFilter = f.repoPath;
      this.activeId = w.id;
      this.modal.open = false;
      this.$nextTick(() => {
        const el = this.$refs.mainInput;
        if (el) { el.focus(); this.autoGrow(el); }
      });
    },

    addRepo() {
      const f = this.modal.form;
      const name = f.addName || f.addPath.split('/').pop();
      this.repos.push({ name, path: f.addPath, shortPath: f.addPath, detected: { defaultBranch: 'main' }, overrides: {} });
      this.activeProjectFilter = f.addPath;
      this.modal.open = false;
      this.$nextTick(() => this.openModal('wizard'));
    },

    addRepoFromBrowser() {
      const path = this.fb.path;
      const name = this.modal.form.addName || path.split('/').filter(Boolean).pop();
      this.repos.push({ name, path, shortPath: path, detected: { defaultBranch: 'main' }, overrides: {} });
      this.activeProjectFilter = path;
      this.modal.open = false;
      this.$nextTick(() => this.openModal('wizard'));
    },

    acceptRename(s) {
      s.branch = s.renameProposal;
      s.title = s.renameProposal.replace(/^(feat|fix|refactor|docs|chore)\//, '').replace(/-/g, ' ');
      s.renameProposal = null;
    },
    dismissRename(s) { s.renameProposal = null; },

    // ── Branch edit (sidecar) ──
    startBranchEdit(s) {
      this.editingBranch = s.id;
      this.branchEditValue = s.branch;
      this.$nextTick(() => this.$refs.branchInput?.focus());
    },
    saveBranchEdit() {
      const s = this.sessions.find(w => w.id === this.editingBranch);
      if (!s || !this.branchEditValue.trim()) { this.cancelBranchEdit(); return; }
      const newName = this.branchEditValue.trim();
      const oldName = s.branch;
      if (newName === oldName) { this.cancelBranchEdit(); return; }
      if (s.vcs?.pr?.exists && s.vcs.pr.status === 'open') {
        alert('⚠ Branch has an open PR (#' + s.vcs.pr.number + '). In production, Glue will close and recreate the PR with the new branch name via GitHub API.');
      }
      if (s.vcs?.git?.remoteBranchExists) {
        console.log('[mock] git push origin :' + oldName + ' ' + newName);
        console.log('[mock] git push -u origin ' + newName);
      }
      s.branch = newName;
      if (!s.title) {
        s.title = newName.replace(/^(feat|fix|refactor|docs|chore|glue)\//, '').replace(/-/g, ' ');
      }
      this.editingBranch = null;
    },
    cancelBranchEdit() { this.editingBranch = null; },

    // ── Session list helpers ──
    checksLabel(w) {
      const c = w.vcs?.pr?.checks;
      if (!c || c.state === 'not_run') return '';
      const glyphs = { running: '↻', success: '✓', failure: '✗' };
      return glyphs[c.state] || '';
    },

    // ── Lifecycle state machine ──
    deriveLifecycle(s) {
      if (!s?.vcs) return { step: 'NONE', primary: '—' };
      const { git, pr } = s.vcs;
      if (git.isMerged || pr.status === 'merged') return { step: 'MERGED', primary: 'Archive' };
      if (pr.exists && pr.status === 'open') {
        if (pr.checks.state === 'running') return { step: 'PR_CHECKS_RUNNING', primary: 'Checks running…' };
        if (pr.checks.state === 'failure') return { step: 'PR_CHECKS_FAILED', primary: 'Merge (checks failed)' };
        if (pr.checks.state === 'success') return { step: 'PR_CHECKS_GREEN', primary: 'Merge' };
        return { step: 'PR_OPEN', primary: 'Waiting for checks…' };
      }
      if (pr.exists && pr.status === 'closed') return { step: 'PR_CLOSED', primary: 'Create PR' };
      if (git.hasUncommittedChanges) return { step: 'UNCOMMITTED', primary: 'Commit changes' };
      if (git.localCommitsAhead > 0 || !git.remoteBranchExists) return { step: 'UNPUSHED', primary: 'Push' };
      return { step: 'PUSHED', primary: 'Create PR' };
    },
    lcIsMerged(s) {
      return s?.vcs?.git?.isMerged || s?.vcs?.pr?.status === 'merged';
    },
    lcStepClass(s, step) {
      const lc = this.deriveLifecycle(s);
      const order = ['UNCOMMITTED', 'UNPUSHED', 'PUSHED', 'PR_OPEN', 'PR_CHECKS_RUNNING', 'PR_CHECKS_GREEN', 'PR_CHECKS_FAILED', 'MERGED'];
      const stepMap = {
        commit: ['UNCOMMITTED'],
        push: ['UNPUSHED'],
        pr: ['PUSHED', 'PR_CLOSED'],
        checks: ['PR_OPEN', 'PR_CHECKS_RUNNING', 'PR_CHECKS_GREEN', 'PR_CHECKS_FAILED'],
        merge: ['MERGED'],
      };
      if (stepMap[step]?.includes(lc.step)) {
        if (lc.step === 'PR_CHECKS_FAILED') return 'failed';
        return 'current';
      }
      const currentIdx = order.indexOf(lc.step);
      const stepIndices = (stepMap[step] || []).map(s => order.indexOf(s)).filter(i => i >= 0);
      if (stepIndices.length > 0 && stepIndices[0] < currentIdx) return 'done';
      return '';
    },
    lcActionClass(s) {
      const lc = this.deriveLifecycle(s);
      if (lc.step === 'MERGED') return 'success';
      if (lc.step === 'PR_CHECKS_FAILED') return 'danger';
      return '';
    },
    lcActionDisabled(s) {
      const lc = this.deriveLifecycle(s);
      return lc.step === 'PR_CHECKS_RUNNING' || lc.step === 'PR_OPEN';
    },
    lcWarning(s) {
      if (!s?.vcs) return null;
      const lc = this.deriveLifecycle(s);
      if (lc.step === 'PR_CHECKS_FAILED') return 'Some checks failed — merge at your own risk';
      if (s.vcs.pr.exists && s.vcs.pr.status === 'open' && s.vcs.git.hasUncommittedChanges)
        return 'Uncommitted changes in worktree';
      return null;
    },
    performLifecycleAction(s) {
      if (!s?.vcs) return;
      const lc = this.deriveLifecycle(s);
      switch (lc.step) {
        case 'UNCOMMITTED':
          s.vcs.git.hasUncommittedChanges = false;
          s.vcs.git.localCommitsAhead++;
          break;
        case 'UNPUSHED':
          s.vcs.git.localCommitsAhead = 0;
          s.vcs.git.remoteBranchExists = true;
          s.vcs.git.hasUpstream = true;
          break;
        case 'PUSHED':
        case 'PR_CLOSED':
          s.vcs.pr = { exists: true, url: 'https://github.com/example/repo/pull/99', number: 99, status: 'open', checks: { state: 'running' } };
          setTimeout(() => {
            if (s.vcs.pr.status === 'open') {
              s.vcs.pr.checks = { state: Math.random() > 0.3 ? 'success' : 'failure', failingCount: 1 };
            }
          }, 2000);
          break;
        case 'PR_CHECKS_GREEN':
        case 'PR_CHECKS_FAILED':
          s.vcs.pr.status = 'merged';
          s.vcs.git.isMerged = true;
          if (this.config.globalDefaults.deleteBranchOnMerge === 'yes') {
            s.vcs.git.remoteBranchExists = false;
          }
          break;
        case 'MERGED':
          this.archiveSession(s.id);
          break;
      }
    },

    // ── Modal dismiss ──
    tryDismissModal() {
      if (this.modal.kind === 'wizard' && (this.modal.step > 1 || this.modal.form.prompt || this.modal.repoMode)) {
        this.showDismissConfirm = true;
      } else {
        this.modal.open = false;
      }
    },

    // ── Wizard step navigation ──
    wizardGoTo(step) {
      if (step <= this.modal.step) {
        this.modal.step = step;
      } else if (step === this.modal.step + 1 && this.wizardCanNext()) {
        this.wizardNext();
      }
    },

    // ── Quick create ──
    quickCreate() {
      const repoPath = this.activeProjectFilter === '__all__' ? this.repos[0]?.path : this.activeProjectFilter;
      const eff = this.effectiveSettings(repoPath);
      const name = generateName();
      let branch = null, worktreePath = null;
      if (eff.wsMode === 'new-worktree') {
        worktreePath = repoPath + '/.worktrees/' + name;
        this.worktrees.push({ repo: repoPath, branch: name, path: '.worktrees/' + name });
        branch = (eff.branchPrefix || 'glue/') + name;
      }
      if (!this._quickId) this._quickId = 200;
      const id = 'S-' + (this._quickId++).toString(16).padStart(2, '0');
      const s = {
        id, project: repoPath, worktreePath, branch, tempName: name,
        title: null, renameProposal: null,
        model: eff.model, provider: eff.provider,
        alive: true, archived: false, time: 'now', tokens: 0,
        vcs: branch ? {
          git: { hasUncommittedChanges: false, localCommitsAhead: 0, hasUpstream: false, remoteBranchExists: false, isMerged: false },
          pr: { exists: false, url: null, number: null, status: 'none', checks: { state: 'not_run' } },
        } : null,
        blocks: [],
      };
      this.sessions.push(s);
      if (this.activeProjectFilter !== '__all__') this.activeProjectFilter = repoPath;
      this.activeId = s.id;
      this.modal.open = false;
      this.$nextTick(() => this.$refs.mainInput?.focus());
    },

    archiveSession(id) {
      const w = this.sessions.find(w => w.id === id);
      if (w) { w.archived = true; w.alive = false; }
      this.showWrapup = null;
      if (this.activeId === id) {
        const next = this.activeSessions().find(w => w.id !== id);
        this.activeId = next?.id || null;
      }
    },
    deleteSession(id) {
      this.sessions = this.sessions.filter(w => w.id !== id);
      this.showWrapup = null;
      if (this.activeId === id) this.activeId = this.activeSessions()[0]?.id || null;
    },

    sendMessage() {
      if (!this.inputText.trim() || !this.activeSession()) return;
      const s = this.activeSession();
      const text = this.inputText.trim();

      // Handle slash commands
      if (text.startsWith('/')) {
        const cmdName = text.substring(1).split(/\s+/)[0].toLowerCase();
        const cmd = this.slashCommands.find(c =>
          c.name === cmdName || (c.aliases && c.aliases.split(', ').includes(cmdName))
        );
        if (cmd) {
          s.blocks.forEach(b => { if (b.streaming) b.streaming = false; });
          s.blocks.push({ type: 'user', text });
          s.blocks.push({ type: 'assistant', text: this.executeSlashCommand(cmd.name, s), streaming: false });
          this.inputText = '';
          this.slashActive = false;
          this.outputSticky = true;
          this.scrollOutputToEnd();
          this.$nextTick(() => { const el = this.$refs.mainInput; if (el) this.autoGrow(el); });
          return;
        }
      }

      s.blocks.forEach(b => { if (b.streaming) b.streaming = false; });
      s.blocks.push({ type: 'user', text });
      s.blocks.push({ type: 'assistant', text: 'Processing...', streaming: true });
      s.time = 'now';
      this.inputText = '';
      this.outputSticky = true;
      this.scrollOutputToEnd();
      this.$nextTick(() => { const el = this.$refs.mainInput; if (el) this.autoGrow(el); });
      // Simulate auto-rename after 3rd user message
      const userMsgs = s.blocks.filter(b => b.type === 'user').length;
      if (userMsgs >= 3 && !s.title && !s.renameProposal && s.branch.startsWith('glue/')) {
        setTimeout(() => {
          const words = s.blocks.filter(b => b.type === 'user').map(b => b.text).join(' ');
          const slug = words.split(/\s+/).slice(0, 3).join('-').toLowerCase().replace(/[^a-z0-9-]/g, '');
          s.renameProposal = 'feat/' + slug;
        }, 500);
      }
    },

    executeSlashCommand(name, s) {
      switch (name) {
        case 'help': return '/help      Show available commands\n/clear     Clear conversation\n/exit      Exit session\n/model     Show/set model\n/info      Session info\n/tools     List tools\n/history   Input history\n/compact   Compact context\n/approve   Approve tool calls';
        case 'clear': return '✓ Conversation cleared.';
        case 'info': case 'status': return `Session: ${s.tempName}\nBranch: ${s.branch || '(none)'}\nModel: ${s.provider}/${s.model}\nTokens: ${s.tokens}`;
        case 'model': return `Current model: ${s.provider}/${s.model}`;
        case 'tools': return 'Available tools:\n  read_file     Read file contents\n  write_file    Write to file\n  edit_file     Edit file\n  bash          Run shell command\n  glob          Find files\n  grep          Search in files';
        case 'history': return 'Input history:\n  ' + s.blocks.filter(b => b.type === 'user').map(b => b.text).join('\n  ');
        case 'compact': return '✓ Context compacted. Removed 12 tool results.';
        case 'approve': return '✓ All pending tool calls approved.';
        case 'exit': return '✓ Session ended.';
        default: return `Unknown command: /${name}`;
      }
    },

    // ── Keyboard / palette ──
    openPalette() {
      this.overlay.title = 'Command Palette';
      this.overlay.tag = '/';
      this.overlay.query = '';
      this.overlay.selected = 0;
      this.overlay.items = [
        { key: 'n', label: 'New session', action: () => this.openModal('wizard') },
        { key: 'p', label: 'Switch project', action: () => { this.showRepoDD = true; this.$nextTick(() => this.$refs.repoSearchInput?.focus()); } },
        { key: 't', label: 'Toggle sidecar', action: () => { this.showSidecar = !this.showSidecar; } },
        { key: 's', label: 'Settings', action: () => this.openModal('settings') },
        ...this.sessions.filter(w => !w.archived).map(w => ({
          key: '', label: (w.title || w.tempName) + ' · ' + w.model,
          action: () => { if (this.activeProjectFilter !== '__all__') this.activeProjectFilter = w.project; this.switchTo(w.id); },
        })),
      ];
      this.overlay.open = true;
      this.$nextTick(() => this.$refs.overlayInput?.focus());
    },
    filteredOverlayItems() {
      if (!this.overlay.query) return this.overlay.items;
      const q = this.overlay.query.toLowerCase();
      return this.overlay.items.filter(i => i.label.toLowerCase().includes(q));
    },
    executeOverlay(item) { if (item.action) item.action(); this.overlay.open = false; },

    handleKeys(e) {
      if (this.showDismissConfirm) { if (e.key === 'Escape') { this.showDismissConfirm = false; this.modal.open = false; e.preventDefault(); } return; }
      if (this.modal.open) { if (e.key === 'Escape') { this.modal.open = false; e.preventDefault(); } return; }
      if (this.overlay.open) {
        if (e.key === 'Escape') { this.overlay.open = false; e.preventDefault(); }
        else if (e.key === 'ArrowDown') { this.overlay.selected = Math.min(this.overlay.selected + 1, this.filteredOverlayItems().length - 1); e.preventDefault(); }
        else if (e.key === 'ArrowUp') { this.overlay.selected = Math.max(this.overlay.selected - 1, 0); e.preventDefault(); }
        else if (e.key === 'Enter') { const items = this.filteredOverlayItems(); if (items[this.overlay.selected]) this.executeOverlay(items[this.overlay.selected]); e.preventDefault(); }
        return;
      }
      if (this.showRepoDD && e.key === 'Escape') { this.showRepoDD = false; e.preventDefault(); return; }
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.key === '/') { e.preventDefault(); this.openPalette(); }
      else if (e.key === 't') this.showSidecar = !this.showSidecar;
      else if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); this.openModal('wizard'); }
    },

    closeDropdowns(e) { this.showRepoDD = false; this.showWrapup = null; },

    autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; },
    onOutputScroll() {
      const el = this.$refs.output;
      if (!el) return;
      this.outputSticky = el.scrollTop + el.clientHeight >= el.scrollHeight - 24;
    },
    scrollOutputToEnd() {
      this.$nextTick(() => {
        const el = this.$refs.output;
        if (el && this.outputSticky) el.scrollTop = el.scrollHeight;
      });
    },

    // ── Slash completion ──
    updateSlash() {
      const text = this.inputText;
      if (!text.startsWith('/') || /\s/.test(text.slice(1))) {
        this.slashActive = false;
        this.slashMatches = [];
        this.slashSelected = 0;
        return;
      }
      const prefix = text.substring(1).toLowerCase();
      const matches = this.slashCommands.filter(cmd =>
        cmd.name.startsWith(prefix) ||
        (cmd.aliases && cmd.aliases.split(', ').some(a => a.startsWith(prefix)))
      );
      if (matches.length > 0) {
        this.slashActive = true;
        this.slashMatches = matches;
        this.slashSelected = Math.min(this.slashSelected, matches.length - 1);
      } else {
        this.slashActive = false;
        this.slashMatches = [];
        this.slashSelected = 0;
      }
    },

    acceptSlash(cmd) {
      this.inputText = '/' + cmd.name + ' ';
      this.slashActive = false;
      this.slashMatches = [];
      this.slashSelected = 0;
      this.$nextTick(() => {
        const el = this.$refs.mainInput;
        if (el) { el.focus(); this.autoGrow(el); }
      });
    },

    handleInputKeydown(e) {
      if (this.slashActive && this.slashMatches.length > 0) {
        switch (e.key) {
          case 'ArrowUp':
            e.preventDefault();
            this.slashSelected = (this.slashSelected - 1 + this.slashMatches.length) % this.slashMatches.length;
            return;
          case 'ArrowDown':
            e.preventDefault();
            this.slashSelected = (this.slashSelected + 1) % this.slashMatches.length;
            return;
          case 'Tab':
            e.preventDefault();
            this.acceptSlash(this.slashMatches[this.slashSelected]);
            return;
          case 'Enter':
            if (!e.shiftKey) {
              e.preventDefault();
              this.acceptSlash(this.slashMatches[this.slashSelected]);
              return;
            }
            break;
          case 'Escape':
            e.preventDefault();
            this.slashActive = false;
            return;
        }
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.sendMessage();
      }
    },

    // ── File browser ──
    fbInit() {
      this.fb.path = this.fb.serverCwd;
      this.fb.currentDir = this.fb.serverCwd;
      this.fb.suggestions = [];
      this.fb.isGitRepo = false;
      this.fb.expandedPath = this.fbExpandTilde(this.fb.serverCwd);
      this.fbNavigateTo(this.fb.serverCwd);
    },

    fbExpandTilde(path) {
      if (path.startsWith('~/')) return this.fb.serverHome + path.substring(1);
      if (path === '~') return this.fb.serverHome;
      return path;
    },

    fbNavigateTo(path) {
      path = path.replace(/\/+$/, '') || '~';
      this.fb.path = path;
      this.fb.currentDir = path;
      this.fb.expandedPath = this.fbExpandTilde(path);
      this.fb.suggestions = [];
      this.fb.cursor = 0;

      const parts = path.split('/');
      this.fb.parentPath = parts.length > 1 ? parts.slice(0, -1).join('/') || '~' : null;
      if (path === '~') this.fb.parentPath = null;

      const entry = this.mockFs[path];
      if (entry) {
        this.fb.listing = [];
        for (const d of entry.dirs) {
          if (d === '.git') continue;
          const childPath = path + '/' + d;
          const childEntry = this.mockFs[childPath];
          const hasGit = childEntry ? childEntry.dirs.includes('.git') : false;
          this.fb.listing.push({ name: d + '/', isDir: true, fullPath: childPath, hasGit });
        }
        for (const f of entry.files) {
          this.fb.listing.push({ name: f, isDir: false, fullPath: path + '/' + f, hasGit: false });
        }
        this.fb.isGitRepo = entry.dirs.includes('.git');
      } else {
        this.fb.listing = [];
        this.fb.isGitRepo = false;
      }
    },

    fbUpdatePath() {
      const rawPath = this.fb.path;
      const path = rawPath.replace(/\/+$/, '') || '~';
      this.fb.expandedPath = this.fbExpandTilde(path);

      const lastSlash = path.lastIndexOf('/');
      if (lastSlash >= 0) {
        const parentDir = path.substring(0, lastSlash) || '~';
        const partial = path.substring(lastSlash + 1).toLowerCase();
        const parentEntry = this.mockFs[parentDir];
        if (parentEntry && partial) {
          this.fb.suggestions = parentEntry.dirs
            .filter(d => d !== '.git' && d.toLowerCase().startsWith(partial))
            .map(d => parentDir + '/' + d);
        } else {
          this.fb.suggestions = [];
        }
      } else {
        this.fb.suggestions = [];
      }

      if (this.mockFs[path]) {
        this.fbNavigateTo(path);
        this.fb.path = rawPath;
      }
    },

    fbAcceptSuggestion() {
      if (this.fb.suggestions.length > 0) {
        this.fbAcceptPath(this.fb.suggestions[0]);
      }
    },

    fbAcceptPath(path) {
      this.fb.path = path;
      this.fb.suggestions = [];
      this.fbNavigateTo(path);
    },

    fbBreadcrumbs() {
      const path = this.fb.currentDir;
      if (!path || path === '~') return [{ name: '~', path: '~' }];
      const parts = path.split('/');
      const crumbs = [];
      let accumulated = '';
      for (let i = 0; i < parts.length; i++) {
        accumulated = i === 0 ? parts[0] : accumulated + '/' + parts[i];
        crumbs.push({ name: parts[i], path: accumulated });
      }
      return crumbs;
    },

    fbHandleKeys(e) {
      const hasParent = this.fb.parentPath !== null;
      const totalItems = this.fb.listing.length + (hasParent ? 1 : 0);
      if (totalItems === 0) return;

      switch (e.key) {
        case 'ArrowUp':
          e.preventDefault();
          this.fb.cursor = Math.max(0, this.fb.cursor - 1);
          this.$nextTick(() => {
            const items = this.$refs.fbListing?.querySelectorAll('.fb-item');
            items?.[this.fb.cursor]?.scrollIntoView({ block: 'nearest' });
          });
          break;
        case 'ArrowDown':
          e.preventDefault();
          this.fb.cursor = Math.min(totalItems - 1, this.fb.cursor + 1);
          this.$nextTick(() => {
            const items = this.$refs.fbListing?.querySelectorAll('.fb-item');
            items?.[this.fb.cursor]?.scrollIntoView({ block: 'nearest' });
          });
          break;
        case 'Enter':
          e.preventDefault();
          if (hasParent && this.fb.cursor === 0) {
            this.fbNavigateTo(this.fb.parentPath);
          } else {
            const idx = this.fb.cursor - (hasParent ? 1 : 0);
            const item = this.fb.listing[idx];
            if (item?.isDir) this.fbNavigateTo(item.fullPath);
          }
          break;
        case 'ArrowLeft':
        case 'Backspace':
          if (this.fb.parentPath) {
            e.preventDefault();
            this.fbNavigateTo(this.fb.parentPath);
          }
          break;
        case 'ArrowRight':
          e.preventDefault();
          if (hasParent && this.fb.cursor === 0) break;
          const ridx = this.fb.cursor - (hasParent ? 1 : 0);
          const ritem = this.fb.listing[ridx];
          if (ritem?.isDir) this.fbNavigateTo(ritem.fullPath);
          break;
      }
    },

    // ── Wizard navigation ──
    wizardNext() {
      if (!this.wizardCanNext()) return;
      if (this.modal.step === 1 && this.modal.repoMode) {
        const path = this.fb.path;
        const name = this.modal.form.addName || path.split('/').filter(Boolean).pop();
        if (!this.repos.find(r => r.path === path)) {
          this.repos.push({ name, path, shortPath: path, detected: { defaultBranch: 'main' }, overrides: {} });
        }
        this.modal.form.repoPath = path;
        this.modal.repoMode = false;
      }
      // Re-resolve effective settings when entering step 2
      if (this.modal.step === 1) {
        const eff = this.effectiveSettings(this.modal.form.repoPath);
        this.modal.form.provider = eff.provider;
        this.modal.form.model = eff.model;
        this.modal.form.wsMode = eff.wsMode;
        this.modal.form.baseBranch = eff.baseBranch;
        if (!this.modelsFor(this.modal.form.provider).includes(this.modal.form.model)) {
          this.modal.form.model = this.modelsFor(this.modal.form.provider)[0];
        }
      }
      this.modal.step = Math.min(3, this.modal.step + 1);
    },

    wizardBack() {
      this.modal.step = Math.max(1, this.modal.step - 1);
    },

    wizardCanNext() {
      if (this.modal.step === 1) {
        if (this.modal.repoMode) return !!this.fb.path && this.fb.path !== '~';
        return !!this.modal.form.repoPath;
      }
      if (this.modal.step === 2) {
        if (this.modal.form.wsMode === 'existing-worktree') return !!this.modal.form.existingWt;
        return true;
      }
      return true;
    },

    wizardHint() {
      if (this.modal.step === 1) {
        if (this.modal.repoMode) {
          return this.fb.isGitRepo ? '● project ready' : 'browse to a directory';
        }
        return this.modal.form.repoPath.split('/').pop();
      }
      if (this.modal.step === 2) {
        if (this.modal.form.wsMode === 'new-worktree') return '⑂ .worktrees/' + this.modal.form.generatedName;
        if (this.modal.form.wsMode === 'project-root') return 'project root';
        return this.modal.form.existingWt || '...';
      }
      return 'step 3 of 3';
    },

    validateWizardModel() {
      const models = this.modelsFor(this.modal.form.provider);
      if (!models.includes(this.modal.form.model)) {
        this.modal.form.model = models[0];
      }
    },

    // ── Settings helpers ──
    settingsRepo() {
      return this.repos.find(r => r.path === this.settingsRepoPath) || null;
    },

    hasOverride(key) {
      const repo = this.settingsRepo();
      return repo && repo.overrides[key] !== undefined;
    },

    getOverride(key) {
      const repo = this.settingsRepo();
      return repo?.overrides[key] ?? this.config.globalDefaults[key];
    },

    setOverride(key, value) {
      const repo = this.settingsRepo();
      if (repo) repo.overrides[key] = value;
    },

    clearOverride(key) {
      const repo = this.settingsRepo();
      if (repo) delete repo.overrides[key];
    },

    toggleOverride(key, fallbackValue) {
      if (this.hasOverride(key)) {
        this.clearOverride(key);
      } else {
        this.setOverride(key, fallbackValue);
      }
    },

    effectiveForRepo(key) {
      const repo = this.settingsRepo();
      return repo?.overrides[key] ?? this.config.globalDefaults[key];
    },

    validateGlobalModel() {
      const models = this.modelsFor(this.config.globalDefaults.provider);
      if (!models.includes(this.config.globalDefaults.model)) {
        this.config.globalDefaults.model = models[0];
      }
    },

    validateRepoModel() {
      const repo = this.settingsRepo();
      if (!repo || !repo.overrides.model) return;
      const provider = repo.overrides.provider ?? this.config.globalDefaults.provider;
      const models = this.modelsFor(provider);
      if (!models.includes(repo.overrides.model)) {
        repo.overrides.model = models[0];
      }
    },

    bulkSetBaseBranch(branch) {
      for (const r of this.repos) {
        r.overrides.baseBranch = branch;
      }
    },

    bulkClearOverride(key) {
      for (const r of this.repos) {
        delete r.overrides[key];
      }
    },

    saveConfig() {
      localStorage.setItem('glue-config', JSON.stringify(this.config));
      this.modal.open = false;
    },
  };
}
</script>
</body>
</html>
