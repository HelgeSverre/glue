# e2e tests require Ollama running locally with a model pulled.
# Skipped by default. Run with: dart test --run-skipped -t e2e
tags:
  e2e:
    skip: "Requires Ollama running locally"
  ollama_registry:
    skip: "Network test; opt in with -t ollama_registry"
  anchor_browser:
    skip: "Network test; requires ANCHOR_API_KEY or ~/.glue/config.yaml web.browser.anchor.api_key"
  hyperbrowser:
    skip: "Network test; requires HYPERBROWSER_API_KEY or ~/.glue/config.yaml web.browser.hyperbrowser.api_key"
  integration:
    skip: "Network test; opt in with -t integration"
