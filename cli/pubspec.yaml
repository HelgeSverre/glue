name: glue
description: The coding agent that holds it all together.
version: 0.6.0
homepage: https://www.getglue.dev/
repository: https://github.com/HelgeSverre/glue
documentation: https://www.getglue.dev/docs/getting-started/installation
issue_tracker: https://github.com/HelgeSverre/glue/issues
topics: [ cli, ai, llm, agent, terminal ]

# Distribution is via the AOT-compiled binary, not pub. Suppresses the
# "publishable packages can't have path dependencies" warning so we can
# depend on the in-repo glue_core package without conflict.
publish_to: none

executables:
  glue: glue

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  args: ^2.7.0
  cli_completion: ^0.5.1
  glue_core:
    path: ../packages/glue_core
  glue_runtimes:
    path: ../packages/glue_runtimes
  glue_harness:
    path: ../packages/glue_harness
  glue_server:
    path: ../packages/glue_server
  glue_strategies:
    path: ../packages/glue_strategies
  html: ^0.15.5
  http: ^1.6.0
  markdown: ^7.3.1
  meta: ^1.15.0
  path: ^1.9.1
  puppeteer: ^3.20.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.1
  crypto: ^3.0.7

dev_dependencies:
  test: ^1.30.0
  lints: ^6.1.0
