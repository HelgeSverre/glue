name: glue-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped
    labels:
      dev.dozzle.group: telemetry
    environment:
      OPENOBSERVE_AUTH_HEADER: ${OPENOBSERVE_AUTH_HEADER}
      OTEL_EXPORTER_FILE_PATH: ${OTEL_EXPORTER_FILE_PATH:-/var/lib/otel/traces.jsonl}
    volumes:
      - ./otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./data/collector:/var/lib/otel
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - jaeger
      - tempo
      - zipkin
      - openobserve
      - aspire-dashboard

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: jaeger
    restart: unless-stopped
    labels:
      dev.dozzle.group: tracing
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    restart: unless-stopped
    labels:
      dev.dozzle.group: tracing
    ports:
      - "9411:9411"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    restart: unless-stopped
    labels:
      dev.dozzle.group: tracing
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./data/tempo:/var/tempo
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana-oss:11.5.1
    container_name: grafana
    restart: unless-stopped
    labels:
      dev.dozzle.group: dashboards
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - jaeger
      - zipkin

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    labels:
      dev.dozzle.group: dashboards
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-helge.sverre@gmail.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-123456}
    volumes:
      - ./data/openobserve:/data
    ports:
      - "5080:5080"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.2
    container_name: aspire-dashboard
    restart: unless-stopped
    labels:
      dev.dozzle.group: dashboards
      dev.dozzle.name: Aspire Dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
      - "18889:18889"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    profiles: ["llm"]
    labels:
      dev.dozzle.group: llm
      dev.dozzle.name: LiteLLM Proxy
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    env_file:
      - .dockerconfig
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"

  llmflow:
    image: helgesverre/llmflow:latest
    container_name: llmflow
    restart: unless-stopped
    profiles: ["extras", "tool-llmflow"]
    labels:
      dev.dozzle.group: llm-observability
      dev.dozzle.name: LLMFlow
    volumes:
      - ./data/llmflow:/root/.llmflow
    ports:
      - "8899:3000"

  helicone:
    image: helicone/helicone-all-in-one:latest
    container_name: helicone
    restart: unless-stopped
    profiles: ["extras", "tool-helicone"]
    labels:
      dev.dozzle.group: llm-observability
      dev.dozzle.name: Helicone
    ports:
      - "8585:8585"
      - "8989:3000"

  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped
    profiles: ["extras", "tool-langfuse"]
    labels:
      dev.dozzle.group: langfuse
      dev.dozzle.name: Langfuse Postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - ./data/langfuse/postgres:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    profiles: ["extras", "tool-langfuse"]
    labels:
      dev.dozzle.group: langfuse
      dev.dozzle.name: Langfuse
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-langfuse-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-langfuse-salt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-4f8645ce00c861a7d29a5e0fb261707204bdd35f10e8f7f4b7a4ac8b0d8b86f0}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-default}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Glue Local}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-glue}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-Glue Local}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-helge.sverre@gmail.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Helge}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-localdev123}
    ports:
      - "3002:3000"

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    restart: unless-stopped
    profiles: ["extras", "tool-phoenix"]
    labels:
      dev.dozzle.group: llm-observability
      dev.dozzle.name: Arize Phoenix
    environment:
      PHOENIX_ENABLE_AUTH: "false"
    volumes:
      - ./data/phoenix:/mnt/data
    ports:
      - "6006:6006"

  openlit:
    image: ghcr.io/openlit/openlit:latest
    container_name: openlit
    restart: unless-stopped
    profiles: ["extras", "tool-openlit"]
    labels:
      dev.dozzle.group: llm-observability
      dev.dozzle.name: OpenLIT
    environment:
      SQLITE_DATABASE_URL: file:/app/client/data/openlit.db
    volumes:
      - ./data/openlit:/app/client/data
    ports:
      - "3011:3000"

  opik-mysql:
    image: mysql:8.4.2
    container_name: opik-mysql
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik MySQL
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    volumes:
      - ./data/opik/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 2s
      timeout: 2s
      retries: 60

  opik-redis:
    image: redis:7.2.4-alpine3.19
    container_name: opik-redis
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik Redis
    command: redis-server --requirepass opik
    volumes:
      - ./data/opik/redis:/data

  opik-clickhouse:
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    container_name: opik-clickhouse
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik ClickHouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      - opik-zookeeper
    volumes:
      - ./data/opik/clickhouse:/var/lib/clickhouse
      - ./opik/clickhouse/additional_config.xml:/etc/clickhouse-server/config.d/additional_config.xml:ro

  opik-zookeeper:
    image: zookeeper:3.9.4
    container_name: opik-zookeeper
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik ZooKeeper
    environment:
      JVMFLAGS: "-Xmx512m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
    volumes:
      - ./data/opik/zookeeper:/data

  opik-minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: opik-minio
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik MinIO
    environment:
      MINIO_ROOT_USER: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      MINIO_ROOT_PASSWORD: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
    command: server --console-address ":9090" /data
    volumes:
      - ./data/opik/minio:/data
    ports:
      - "19000:9000"
      - "19001:9090"

  opik-mc:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: opik-mc
    restart: "no"
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik MinIO Init
    depends_on:
      - opik-minio
    entrypoint: >
      /bin/sh -c "
      sleep 8s;
      /usr/bin/mc alias set s3 http://opik-minio:9000 ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE} ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY} --api S3v4;
      /usr/bin/mc mb --ignore-existing s3/public;
      /usr/bin/mc anonymous set download s3/public/;
      "

  opik-backend:
    image: ghcr.io/comet-ml/opik/opik-backend:latest
    container_name: opik-backend
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik Backend
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    depends_on:
      - opik-mysql
      - opik-clickhouse
      - opik-minio
      - opik-redis
      - opik-mc
    environment:
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "opik-mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://opik-clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: opik-clickhouse
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      REDIS_URL: redis://:opik@opik-redis:6379/
      OPIK_OTEL_SDK_ENABLED: "false"
      OPIK_USAGE_REPORT_ENABLED: "false"
      AWS_ACCESS_KEY_ID: ${OPIK_MINIO_ROOT_USER:-THAAIOSFODNN7EXAMPLE}
      AWS_SECRET_ACCESS_KEY: ${OPIK_MINIO_ROOT_PASSWORD:-LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      IS_MINIO: "true"
      S3_URL: http://opik-minio:9000
      PYTHON_EVALUATOR_URL: http://opik-python-backend:8000
      TOGGLE_OPIK_AI_ENABLED: "false"
      TOGGLE_GUARDRAILS_ENABLED: "false"
      TOGGLE_WELCOME_WIZARD_ENABLED: "true"
      CORS: "false"
    ports:
      - "18080:8080"

  opik-python-backend:
    image: ghcr.io/comet-ml/opik/opik-python-backend:latest
    container_name: opik-python-backend
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik Python Backend
    depends_on:
      - opik-redis
      - opik-backend
    environment:
      OPIK_OTEL_SDK_ENABLED: "false"
      PYTHON_CODE_EXECUTOR_STRATEGY: process
      PYTHON_CODE_EXECUTOR_ALLOW_NETWORK: "false"
      OPIK_REVERSE_PROXY_URL: http://opik-frontend:5173/api
      PYTHON_BACKEND_PORT: "8000"
      REDIS_URL: redis://:opik@opik-redis:6379/0
      OPIK_URL_OVERRIDE: http://opik-backend:8080
      RQ_WORKER_ENABLED: "true"
    ports:
      - "18000:8000"

  opik-frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:latest
    container_name: opik-frontend
    restart: unless-stopped
    profiles: ["extras", "tool-opik"]
    labels:
      dev.dozzle.group: opik
      dev.dozzle.name: Opik Frontend
    depends_on:
      - opik-backend
    environment:
      OPIK_VERSION: latest
      NGINX_PORT: 5173
      NGINX_CONF_SUFFIX: local
      OTEL_TRACE: off
      OTEL_COLLECTOR_HOST: otel-collector
      OTEL_COLLECTOR_PORT: 4317
    ports:
      - "5179:5173"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: unless-stopped
    profiles: ["extras", "tool-mlflow"]
    labels:
      dev.dozzle.group: llm-observability
      dev.dozzle.name: MLflow
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"
    volumes:
      - ./data/mlflow:/mlflow

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    profiles: ["extras", "tool-dozzle"]
    labels:
      dev.dozzle.group: infra
      dev.dozzle.name: Dozzle
    ports:
      - "8088:8080"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    restart: unless-stopped
    profiles: ["extras", "tool-netdata"]
    labels:
      dev.dozzle.group: infra
      dev.dozzle.name: Netdata
    ports:
      - "19999:19999"
    volumes:
      - ./data/netdata:/var/lib/netdata

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    restart: unless-stopped
    profiles: ["extras", "tool-pyroscope"]
    labels:
      dev.dozzle.group: telemetry
      dev.dozzle.name: Pyroscope
    command: ["server"]
    ports:
      - "4040:4040"
    volumes:
      - ./data/pyroscope:/var/lib/pyroscope

  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: unless-stopped
    profiles: ["extras", "tool-seq"]
    labels:
      dev.dozzle.group: telemetry
      dev.dozzle.name: Seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8082:80"
      - "5341:5341"
    volumes:
      - ./data/seq:/data
