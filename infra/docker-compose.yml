name: glue-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped
    environment:
      OPENOBSERVE_AUTH_HEADER: ${OPENOBSERVE_AUTH_HEADER}
      OTEL_EXPORTER_FILE_PATH: ${OTEL_EXPORTER_FILE_PATH:-/var/lib/otel/traces.jsonl}
    volumes:
      - ./otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./data/collector:/var/lib/otel
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - jaeger
      - tempo
      - zipkin
      - openobserve
      - aspire-dashboard

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  zipkin:
    image: openzipkin/zipkin:3
    restart: unless-stopped
    ports:
      - "9411:9411"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    restart: unless-stopped
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./data/tempo:/var/tempo
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana-oss:11.5.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - jaeger
      - zipkin

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@example.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-observability123}
    volumes:
      - ./data/openobserve:/data
    ports:
      - "5080:5080"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.2
    restart: unless-stopped
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
      - "18889:18889"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    profiles: ["llm"]
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    env_file:
      - .dockerconfig
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"

