name: glue_core
description: Pure-data type vocabulary shared across Glue's harness, strategies, and surfaces.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'

resolution: workspace

# glue_core is deliberately dependency-free. Anything that needs HTTP,
# IO, or a runtime service belongs in a higher layer (see
# docs/plans/2026-04-29-harness-layers.md).
dev_dependencies:
  test: ^1.30.0
  lints: ^6.1.0
