name: glue_core
description: Pure-data type vocabulary shared across Glue's harness, strategies, and surfaces.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'

resolution: workspace

# glue_core stays intentionally low-dependency. Most IO/runtime concerns still
# belong in higher layers; the catalog types are the current exception so the
# bundled model snapshot can use shared serialization/codegen in one place.
dependencies:
  dart_mappable: ^4.8.0

dev_dependencies:
  build_runner: ^2.4.0
  dart_mappable_builder: ^4.8.0
  test: ^1.30.0
  lints: ^6.1.0
