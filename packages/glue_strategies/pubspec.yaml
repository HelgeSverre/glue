name: glue_strategies
description: Strategy implementations (LLM clients, provider adapters, shell executors, web fetch/browser/search) consumed by Glue's harness.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  glue_core:
    path: ../glue_core
  glue_server:
    path: ../glue_server
  crypto: ^3.0.0
  html: ^0.15.5
  http: ^1.6.0
  path: ^1.9.1
  puppeteer: ^3.20.0

dev_dependencies:
  test: ^1.30.0
  lints: ^6.1.0
