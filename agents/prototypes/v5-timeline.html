<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glue — Activity Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FACC15;--gold:#EAB308;--amber:#F59E0B;
  --bg:#050506;--surface:#0d0d0f;--surface-el:#151517;
  --border:#222228;--border-br:#333339;
  --text:#e4e4e8;--text-sec:#9a9aa5;--text-mut:#505058;--text-yel:#FDE047;
  --success:#22C55E;--error:#EF4444;--warning:#F59E0B;--info:#3B82F6;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,rgba(250,204,21,.015) 0%,var(--bg) 60%)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--yellow)}

.app{display:grid;grid-template-columns:250px 1fr 0;height:100vh;transition:grid-template-columns .25s}
.app.detail-open{grid-template-columns:250px 1fr 320px}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.logo{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--yellow)}
.logo span{color:var(--text-mut)}
.sidebar-sub{font-size:10px;color:var(--text-mut);margin-left:auto;font-family:var(--mono)}

.filter-all{display:block;padding:8px 14px;font-size:11px;font-weight:500;cursor:pointer;color:var(--text-sec);border:none;background:none;width:100%;text-align:left;border-bottom:1px solid var(--border);transition:background .1s;font-family:var(--sans)}
.filter-all:hover{background:var(--surface-el)}
.filter-all.active{color:var(--yellow);background:var(--surface-el)}

.tree{flex:1;overflow-y:auto;padding:6px 0}
.tr{display:flex;align-items:center;gap:5px;padding:4px 12px;cursor:pointer;font-size:11px;transition:background .1s;user-select:none}
.tr:hover{background:var(--surface-el)}
.tr.selected{background:var(--surface-el);border-left:2px solid var(--yellow);padding-left:10px}
.ch{width:12px;color:var(--text-mut);font-size:9px;text-align:center;flex-shrink:0;transition:transform .15s}
.ch.open{transform:rotate(90deg)}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sd.running{background:var(--success);box-shadow:0 0 4px var(--success)}
.sd.streaming{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.sd.waiting{background:var(--warning)}
.sd.completed{background:var(--success);opacity:.5}
.sd.error{background:var(--error)}
.sd.idle{background:var(--border-br)}
.tl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-sec)}
.tl.p{font-weight:600;color:var(--text);font-size:12px}
.tl.w{font-family:var(--mono);color:var(--text-mut)}
.tl.a{font-family:var(--mono)}
.tg{border-left:1px solid var(--border);margin-left:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sd.running,.sd.streaming{animation:pulse 2s infinite}

.sidebar-stats{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--text-mut);font-family:var(--mono);display:flex;flex-direction:column;gap:2px}

/* Timeline Main */
.timeline-wrap{overflow-y:auto;display:flex;flex-direction:column}
.timeline-head{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface)}
.timeline-title{font-family:var(--mono);font-size:14px;font-weight:700}
.live-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--success);font-weight:500;margin-left:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite}
.chips{display:flex;gap:4px;margin-left:auto}
.chip{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-mut);transition:all .12s;font-family:var(--sans)}
.chip:hover{border-color:var(--border-br);color:var(--text-sec)}
.chip.active{background:rgba(250,204,21,.08);border-color:rgba(250,204,21,.25);color:var(--yellow)}

.timeline{flex:1;overflow-y:auto;padding:20px 24px 40px;position:relative}
.tl-line{position:absolute;left:28px;top:0;bottom:0;width:2px;background:rgba(250,204,21,.12)}

.tl-event{position:relative;padding-left:52px;margin-bottom:16px}
.tl-dot{position:absolute;left:23px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.tl-dot.tool-ok{background:var(--success)}
.tl-dot.tool-pending{background:var(--warning);animation:pulse 2.5s infinite}
.tl-dot.started{background:var(--info)}
.tl-dot.done{background:var(--success)}
.tl-dot.err{background:var(--error)}
.tl-dot.streaming{background:var(--yellow);animation:pulse 1.5s infinite}

.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;transition:all .15s}
.tl-card:hover{border-color:var(--border-br)}
.tl-card.approval{border-color:rgba(245,158,11,.25);box-shadow:0 0 12px rgba(245,158,11,.04)}
.tl-card.error-card{border-left:2px solid var(--error)}
.tl-card.live-card{border-color:rgba(250,204,21,.25);box-shadow:0 0 12px rgba(250,204,21,.04)}
.tl-meta{display:flex;align-items:center;gap:8px;font-size:10px;margin-bottom:6px}
.tl-time{color:var(--text-mut);font-family:var(--mono)}
.tl-agent{color:var(--text-yel);font-family:var(--mono);font-weight:600}
.tl-branch{color:var(--text-mut);font-family:var(--mono)}
.tl-type{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tl-type.start{background:rgba(59,130,246,.1);color:var(--info)}
.tl-type.complete{background:rgba(34,197,94,.1);color:var(--success)}
.tl-type.tool{background:var(--surface-el);color:var(--text-sec)}
.tl-type.err{background:rgba(239,68,68,.1);color:var(--error)}
.tl-type.approve{background:rgba(245,158,11,.1);color:var(--warning)}
.tl-type.stream{background:rgba(250,204,21,.1);color:var(--yellow)}

.tl-body{font-size:12px;color:var(--text-sec);line-height:1.6}
.tl-tool{font-family:var(--mono);font-size:11px;background:var(--bg);border-radius:4px;padding:6px 10px;margin-top:6px;color:var(--text-mut);line-height:1.5}
.tl-stats{font-size:10px;color:var(--text-mut);font-family:var(--mono);margin-top:6px}
.tl-actions{display:flex;gap:4px;margin-top:8px}
.tl-btn{padding:4px 12px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-sec);font-family:var(--sans);transition:all .12s}
.tl-btn:hover{border-color:var(--border-br);color:var(--text)}
.tl-btn.primary{border-color:rgba(250,204,21,.3);color:var(--yellow)}
.tl-btn.primary:hover{background:rgba(250,204,21,.08)}
.tl-btn.danger{border-color:rgba(239,68,68,.25);color:var(--error)}

.cursor-blink{display:inline-block;width:6px;height:13px;background:var(--yellow);animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

/* Detail Panel */
.detail{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden;transition:width .25s}
.app:not(.detail-open) .detail{width:0;border:none;overflow:hidden}
.detail-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.detail-id{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text-yel)}
.detail-close{margin-left:auto;background:none;border:none;color:var(--text-mut);cursor:pointer;font-size:16px;padding:4px;border-radius:4px}
.detail-close:hover{background:var(--surface-el);color:var(--text)}
.detail-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.detail-row{font-size:11px;display:flex;gap:6px}
.detail-lbl{color:var(--text-mut);width:50px;flex-shrink:0}
.detail-val{color:var(--text-sec);font-family:var(--mono)}
.detail-term{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--text-sec);max-height:200px;overflow-y:auto;white-space:pre-wrap}
.detail-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dm{background:var(--bg);border-radius:4px;padding:6px 8px}
.dm .lbl{font-size:9px;color:var(--text-mut);text-transform:uppercase;letter-spacing:.04em}
.dm .val{font-family:var(--mono);font-size:12px;font-weight:600;margin-top:1px}
</style>
</head>
<body>
<div class="app" :class="detailAgent && 'detail-open'" x-data="timeline()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="logo">glue<span>.</span></span>
      <span class="sidebar-sub">timeline</span>
    </div>
    <button class="filter-all" :class="!filterAgentId && 'active'" @click="filterAgentId=null">All Activity</button>
    <div class="tree">
      <template x-for="proj in projects" :key="proj.name">
        <div>
          <div class="tr" @click="proj.open=!proj.open">
            <span class="ch" :class="proj.open&&'open'">▶</span>
            <span class="tl p" x-text="proj.name"></span>
          </div>
          <template x-if="proj.open">
            <div class="tg" style="margin-left:10px">
              <template x-for="wt in proj.worktrees" :key="wt.branch">
                <div>
                  <div class="tr" @click="wt.open=!wt.open" style="padding-left:8px">
                    <span class="ch" :class="wt.open&&'open'" x-show="wtAgents(proj.name,wt.branch).length">▶</span>
                    <span x-show="!wtAgents(proj.name,wt.branch).length" style="width:12px"></span>
                    <span class="sd" :class="wtHasActive(proj.name,wt.branch)?'running':'idle'"></span>
                    <span class="tl w" x-text="wt.branch"></span>
                  </div>
                  <template x-if="wt.open && wtAgents(proj.name,wt.branch).length">
                    <div class="tg" style="margin-left:10px">
                      <template x-for="ag in wtAgents(proj.name,wt.branch)" :key="ag.id">
                        <div class="tr" :class="filterAgentId===ag.id&&'selected'" @click="filterAgentId=ag.id;detailAgent=ag" style="padding-left:8px">
                          <span class="sd" :class="ag.status"></span>
                          <span class="tl a" :style="{color:sColor(ag.status)}">#<span x-text="ag.id"></span></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
    <div class="sidebar-stats">
      <span>8 agents · 4 running</span>
      <span>21,234 tokens</span>
    </div>
  </aside>

  <!-- Timeline -->
  <div class="timeline-wrap">
    <div class="timeline-head">
      <span class="timeline-title">Activity</span>
      <div class="live-indicator"><span class="live-dot"></span> Live</div>
      <div class="chips">
        <button class="chip" :class="filterType==='all'&&'active'" @click="filterType='all'">All</button>
        <button class="chip" :class="filterType==='tool'&&'active'" @click="filterType='tool'">Tools</button>
        <button class="chip" :class="filterType==='lifecycle'&&'active'" @click="filterType='lifecycle'">Lifecycle</button>
        <button class="chip" :class="filterType==='error'&&'active'" @click="filterType='error'">Errors</button>
      </div>
    </div>
    <div class="timeline">
      <div class="tl-line"></div>
      <template x-for="evt in filteredEvents()" :key="evt.id">
        <div class="tl-event">
          <div class="tl-dot" :class="evt.dotClass"></div>
          <div class="tl-card" :class="evt.cardClass">
            <div class="tl-meta">
              <span class="tl-time" x-text="evt.time"></span>
              <span class="tl-agent" @click="filterAgentId=evt.agentId;detailAgent=agentById(evt.agentId)" style="cursor:pointer">#<span x-text="evt.agentId"></span></span>
              <span class="tl-branch" x-text="evt.branch"></span>
              <span class="tl-type" :class="evt.typeClass" x-text="evt.typeLabel"></span>
            </div>
            <div class="tl-body" x-html="evt.body"></div>
            <template x-if="evt.tool">
              <div class="tl-tool" x-html="evt.tool"></div>
            </template>
            <template x-if="evt.stats">
              <div class="tl-stats" x-text="evt.stats"></div>
            </template>
            <template x-if="evt.actions">
              <div class="tl-actions">
                <template x-for="act in evt.actions" :key="act.label">
                  <button class="tl-btn" :class="act.cls" @click="handleAction(evt, act.action)" x-text="act.label"></button>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Detail Panel -->
  <aside class="detail">
    <template x-if="detailAgent">
      <div>
        <div class="detail-head">
          <span class="detail-id">#<span x-text="detailAgent.id"></span></span>
          <span class="sd" :class="detailAgent.status"></span>
          <span style="font-size:11px;font-weight:500" :style="{color:sColor(detailAgent.status)}" x-text="detailAgent.statusLabel"></span>
          <button class="detail-close" @click="detailAgent=null">×</button>
        </div>
        <div class="detail-body">
          <div class="detail-row"><span class="detail-lbl">Branch</span><span class="detail-val" x-text="detailAgent.branch"></span></div>
          <div class="detail-row"><span class="detail-lbl">Model</span><span class="detail-val" x-text="detailAgent.model"></span></div>
          <div class="detail-row"><span class="detail-lbl">Task</span><span class="detail-val" style="font-family:var(--sans)" x-text="detailAgent.task"></span></div>
          <div class="detail-metrics">
            <div class="dm"><div class="lbl">Tokens</div><div class="val" x-text="detailAgent.tokens.toLocaleString()"></div></div>
            <div class="dm"><div class="lbl">Duration</div><div class="val" x-text="detailAgent.time"></div></div>
            <div class="dm"><div class="lbl">Tools</div><div class="val" x-text="detailAgent.tools"></div></div>
            <div class="dm"><div class="lbl">Step</div><div class="val" x-text="detailAgent.step"></div></div>
          </div>
          <div style="font-size:10px;font-weight:600;color:var(--text-mut);text-transform:uppercase;letter-spacing:.04em;margin-top:4px">Output</div>
          <div class="detail-term" x-text="detailAgent.output"></div>
        </div>
      </div>
    </template>
  </aside>
</div>
