name: Release Tag Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Asset names match install.sh expectations: glue-<os>-<arch>[.exe]
          - os: ubuntu-latest
            asset: glue-linux-x64
          - os: ubuntu-24.04-arm
            asset: glue-linux-arm64
          - os: macos-15
            asset: glue-macos-arm64
          - os: windows-latest
            asset: glue-windows-x64.exe

    defaults:
      run:
        working-directory: cli
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Sync pubspec version to tag
        shell: bash
        run: |
          set -euo pipefail
          raw_tag="${{ github.event.inputs.tag || github.ref_name }}"
          tag_version="${raw_tag#v}"
          # sed -i.bak works on both GNU and BSD sed.
          sed -i.bak "s/^version: .*/version: ${tag_version}/" pubspec.yaml
          rm pubspec.yaml.bak
          dart run tool/gen_version.dart
          # Stage so gen_build_info doesn't tag the build as +dirty.
          git -C .. add cli/pubspec.yaml packages/glue_core/lib/src/version_generated.dart
          grep '^version:' pubspec.yaml

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          dart run tool/gen_build_info.dart
          rm -rf ../dist
          dart build cli bin/glue.dart -o ../dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv ../dist/bundle/bin/glue.exe "../dist/${{ matrix.asset }}"
          else
            mv ../dist/bundle/bin/glue "../dist/${{ matrix.asset }}"
          fi
          rm -rf ../dist/bundle

      - name: Pack tarball (Homebrew-friendly)
        shell: bash
        run: |
          set -euo pipefail
          cd ../dist
          asset='${{ matrix.asset }}'
          tar_name="${asset}.tar.gz"
          stage="$(mktemp -d)"
          if [[ "$asset" == *.exe ]]; then
            cp "$asset" "$stage/glue.exe"
          else
            cp "$asset" "$stage/glue"
            chmod +x "$stage/glue"
          fi
          cp ../LICENSE "$stage/LICENSE"
          cp ../cli/README.md "$stage/README.md"
          tar -czf "$tar_name" -C "$stage" .
          rm -rf "$stage"
          ls -la "$tar_name"

      - name: Compute SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd ../dist
          asset='${{ matrix.asset }}'
          tar_name="${asset}.tar.gz"
          if command -v shasum >/dev/null 2>&1; then
            sha_cmd="shasum -a 256"
          else
            sha_cmd="sha256sum"
          fi
          $sha_cmd "$asset"    > "${asset}.sha256"
          $sha_cmd "$tar_name" > "${tar_name}.sha256"
          cat "${asset}.sha256" "${tar_name}.sha256"

      - name: Smoke test
        shell: bash
        run: "../dist/${{ matrix.asset }} --version"

      - name: Verify artifacts locally (act)
        if: ${{ env.ACT }}
        shell: bash
        run: ls -la ../dist/

      - name: Upload build artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download all artifacts
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Aggregate SHA-256 sums
        if: ${{ !env.ACT }}
        run: |
          cd release-assets
          cat *.sha256 | sort > SHA256SUMS
          echo "--- Combined SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create or update release with binaries
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          # release-assets/glue-* covers raw binaries, .sha256 sidecars, and .tar.gz tarballs.
          assets=(release-assets/glue-* release-assets/SHA256SUMS)
          create_args=(--verify-tag --generate-notes --title "$tag")
          edit_args=(--verify-tag --title "$tag")

          # Treat tags with a `-` suffix (e.g. v0.1.0-rc.1) as prereleases.
          if [[ "$tag" == *-* ]]; then
            create_args+=(--prerelease --latest=false)
            edit_args+=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" "${edit_args[@]}"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" "${create_args[@]}"
          fi

  homebrew:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    # Skip prereleases — Homebrew users should not get -rc/-beta builds by default.
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') }}

    steps:
      - name: Checkout glue (for formula template)
        uses: actions/checkout@v6
        with:
          path: glue
          sparse-checkout: |
            cli/tool/homebrew

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: HelgeSverre/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render and commit Formula/glue.rb
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          raw_tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${raw_tag#v}"

          # Pull SHA256SUMS from the just-published release.
          gh release download "$raw_tag" --pattern 'SHA256SUMS' --output SHA256SUMS

          extract_sha() {
            # SHA256SUMS lines look like: "<sha>  <filename>"
            local name="$1"
            local sha
            sha="$(awk -v n="$name" '$2 == n {print $1}' SHA256SUMS | head -n1)"
            if [ -z "$sha" ]; then
              echo "missing sha256 for $name in SHA256SUMS" >&2
              exit 1
            fi
            printf '%s' "$sha"
          }

          sha_macos_arm64="$(extract_sha glue-macos-arm64.tar.gz)"
          sha_linux_x64="$(extract_sha glue-linux-x64.tar.gz)"
          sha_linux_arm64="$(extract_sha glue-linux-arm64.tar.gz)"

          tmpl=glue/cli/tool/homebrew/glue.rb.tmpl
          out=homebrew-tap/Formula/glue.rb
          mkdir -p "$(dirname "$out")"
          sed \
            -e "s|{{VERSION}}|${version}|g" \
            -e "s|{{SHA256_MACOS_ARM64}}|${sha_macos_arm64}|g" \
            -e "s|{{SHA256_LINUX_X64}}|${sha_linux_x64}|g" \
            -e "s|{{SHA256_LINUX_ARM64}}|${sha_linux_arm64}|g" \
            "$tmpl" > "$out"

          echo "--- Rendered Formula/glue.rb ---"
          cat "$out"

      - name: Commit and push to tap
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          raw_tag="${{ github.event.inputs.tag || github.ref_name }}"
          git config user.name  "glue-release-bot"
          git config user.email "glue-release-bot@users.noreply.github.com"
          git add Formula/glue.rb
          if git diff --cached --quiet -- Formula/glue.rb; then
            echo "Formula/glue.rb unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "glue ${raw_tag}"
          git push origin HEAD
