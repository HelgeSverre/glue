name: Release Tag Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Asset names match install.sh expectations: glue-<os>-<arch>[.exe]
          - os: ubuntu-latest
            asset: glue-linux-x64
          - os: ubuntu-24.04-arm
            asset: glue-linux-arm64
          - os: macos-15
            asset: glue-macos-arm64
          - os: windows-latest
            asset: glue-windows-x64.exe

    defaults:
      run:
        working-directory: cli
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Build executable
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_SHA="$(git rev-parse --short "$GITHUB_SHA")"
          BUILT_BY="${GITHUB_ACTOR:-github-actions[bot]}@${RUNNER_OS:-unknown}"
          dart compile exe bin/glue.dart -o "${{ matrix.asset }}" \
            --define=GLUE_BUILD_TIME="$BUILD_TIME" \
            --define=GLUE_GIT_SHA="$GIT_SHA" \
            --define=GLUE_GIT_DIRTY= \
            --define=GLUE_BUILT_BY="$BUILT_BY"

      - name: Compute SHA-256 checksum
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "${{ matrix.asset }}"
          ./"${{ matrix.asset }}" --version

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: ./"${{ matrix.asset }}" --version

      - name: Verify artifacts locally (act)
        if: ${{ env.ACT }}
        run: ls -la "${{ matrix.asset }}" "${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            cli/${{ matrix.asset }}
            cli/${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download all artifacts
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Aggregate SHA-256 sums
        if: ${{ !env.ACT }}
        run: |
          cd release-assets
          cat *.sha256 | sort > SHA256SUMS
          echo "--- Combined SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create or update release with binaries
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          assets=(release-assets/glue-* release-assets/SHA256SUMS)
          create_args=(--verify-tag --generate-notes --title "$tag")
          edit_args=(--verify-tag --title "$tag")

          # Treat tags with a `-` suffix (e.g. v0.1.0-rc.1) as prereleases.
          if [[ "$tag" == *-* ]]; then
            create_args+=(--prerelease --latest=false)
            edit_args+=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" "${edit_args[@]}"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" "${create_args[@]}"
          fi
