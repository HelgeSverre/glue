name: Release Tag Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Asset names match install.sh expectations: glue-<os>-<arch>[.exe]
          - os: ubuntu-latest
            asset: glue-linux-x64
          - os: ubuntu-24.04-arm
            asset: glue-linux-arm64
          - os: macos-13
            asset: glue-macos-x64
          - os: macos-latest
            asset: glue-macos-arm64
          - os: windows-latest
            asset: glue-windows-x64.exe

    defaults:
      run:
        working-directory: cli
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Build executable
        run: dart compile exe bin/glue.dart -o "${{ matrix.asset }}"

      - name: Compute SHA-256 checksum
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "${{ matrix.asset }}"
          ./"${{ matrix.asset }}" --version

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: ./"${{ matrix.asset }}" --version

      - name: Verify artifacts locally (act)
        if: ${{ env.ACT }}
        run: ls -la "${{ matrix.asset }}" "${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            cli/${{ matrix.asset }}
            cli/${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout (for release notes template)
        uses: actions/checkout@v6

      - name: Download all artifacts
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Aggregate SHA-256 sums
        if: ${{ !env.ACT }}
        run: |
          cd release-assets
          cat *.sha256 | sort > SHA256SUMS
          echo "--- Combined SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create release with binaries
        if: ${{ !env.ACT }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Treat tags with a `-` suffix (e.g. v0.1.0-rc.1) as prereleases.
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          files: |
            release-assets/glue-*
            release-assets/SHA256SUMS
