name: Release Tag Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Asset names match install.sh expectations: glue-<os>-<arch>[.exe]
          - os: ubuntu-latest
            asset: glue-linux-x64
          - os: ubuntu-24.04-arm
            asset: glue-linux-arm64
          - os: macos-15
            asset: glue-macos-arm64
          - os: windows-latest
            asset: glue-windows-x64.exe

    defaults:
      run:
        working-directory: cli
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          dart run tool/gen_build_info.dart
          rm -rf ../dist
          dart build cli bin/glue.dart -o ../dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv ../dist/bundle/bin/glue.exe "../dist/${{ matrix.asset }}"
          else
            mv ../dist/bundle/bin/glue "../dist/${{ matrix.asset }}"
          fi
          rm -rf ../dist/bundle

      - name: Compute SHA-256 checksum
        shell: bash
        run: |
          cd ../dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Smoke test
        shell: bash
        run: "../dist/${{ matrix.asset }} --version"

      - name: Verify artifacts locally (act)
        if: ${{ env.ACT }}
        shell: bash
        run: ls -la "../dist/${{ matrix.asset }}" "../dist/${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download all artifacts
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Aggregate SHA-256 sums
        if: ${{ !env.ACT }}
        run: |
          cd release-assets
          cat *.sha256 | sort > SHA256SUMS
          echo "--- Combined SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create or update release with binaries
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          assets=(release-assets/glue-* release-assets/SHA256SUMS)
          create_args=(--verify-tag --generate-notes --title "$tag")
          edit_args=(--verify-tag --title "$tag")

          # Treat tags with a `-` suffix (e.g. v0.1.0-rc.1) as prereleases.
          if [[ "$tag" == *-* ]]; then
            create_args+=(--prerelease --latest=false)
            edit_args+=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" "${edit_args[@]}"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" "${create_args[@]}"
          fi
