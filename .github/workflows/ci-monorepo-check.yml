name: CI Monorepo Check

on:
  pull_request:
    paths:
      - "cli/**"
      - "packages/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "packages/glue_core/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  push:
    branches:
      - main
    paths:
      - "cli/**"
      - "packages/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "packages/glue_core/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  workflow_dispatch:

jobs:
  check:
    name: Root just check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install glue_core dependencies
        run: just glue_core::deps

      - name: Install glue_strategies dependencies
        # Depends on glue_core via path; resolve after glue_core::deps.
        run: just glue_strategies::deps

      - name: Install glue_harness dependencies
        # Depends on glue_core + glue_strategies via path.
        run: just glue_harness::deps

      - name: Install glue_server dependencies
        # Depends only on glue_core via path.
        run: just glue_server::deps

      - name: Install CLI dependencies
        # CLI's pubspec depends on all four via path; resolve last.
        run: just cli::deps

      - name: Install site dependencies
        run: npm ci --prefix website

      - name: Check formatting (all Dart packages)
        run: |
          dart format --output=none --set-exit-if-changed cli
          dart format --output=none --set-exit-if-changed packages/glue_core
          dart format --output=none --set-exit-if-changed packages/glue_strategies
          dart format --output=none --set-exit-if-changed packages/glue_harness
          dart format --output=none --set-exit-if-changed packages/glue_server

      - name: Generate build metadata
        # build_info_generated.dart is gitignored; the layer-hygiene check and
        # tests below import it transitively, so generate it after the format
        # check (generated artifacts aren't format-gated) and before they run.
        working-directory: cli
        run: dart run tool/gen_build_info.dart

      - name: Layer-import hygiene
        # See docs/plans/2026-04-29-harness-layers.md.
        # Enforces the full four-layer architecture (surface → harness →
        # strategies → core).
        working-directory: cli
        run: dart run tool/check_layers.dart --strict

      - name: Run monorepo quality gate
        run: just check

      - name: Verify local site output (act)
        if: ${{ env.ACT }}
        run: ls -la website/.vitepress/dist

      - name: Upload site artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: getglue-site
          path: website/.vitepress/dist
          if-no-files-found: error
