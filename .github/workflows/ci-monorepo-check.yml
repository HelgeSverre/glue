name: CI Monorepo Check

on:
  pull_request:
    paths:
      - "cli/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  push:
    branches:
      - main
    paths:
      - "cli/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  workflow_dispatch:

jobs:
  check:
    name: Root just check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install CLI dependencies
        run: just cli::deps

      - name: Install site dependencies
        run: npm ci --prefix website

      - name: Check CLI formatting
        run: dart format --output=none --set-exit-if-changed cli

      - name: Run monorepo quality gate
        run: just check

      - name: Verify local site output (act)
        if: ${{ env.ACT }}
        run: ls -la website/.vitepress/dist

      - name: Upload site artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: getglue-site
          path: website/.vitepress/dist
          if-no-files-found: error
