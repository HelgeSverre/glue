name: CI Monorepo Check

on:
  pull_request:
    paths:
      - "cli/**"
      - "packages/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "packages/glue_core/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  push:
    branches:
      - main
    paths:
      - "cli/**"
      - "packages/**"
      - "website/**"
      - "docs/**"
      - "justfile"
      - "cli/justfile"
      - "packages/glue_core/justfile"
      - "website/justfile"
      - ".github/workflows/ci-monorepo-check.yml"
  workflow_dispatch:

jobs:
  check:
    name: Root just check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install glue_core dependencies
        run: just glue_core::deps

      - name: Install CLI dependencies
        # CLI's pubspec depends on glue_core via path; resolve after
        # glue_core::deps so the path target exists.
        run: just cli::deps

      - name: Install site dependencies
        run: npm ci --prefix website

      - name: Check formatting (cli + glue_core)
        run: |
          dart format --output=none --set-exit-if-changed cli
          dart format --output=none --set-exit-if-changed packages/glue_core

      - name: Layer-import hygiene
        # See docs/plans/2026-04-29-harness-layers.md.
        # Enforces the full four-layer architecture (surface → harness →
        # strategies → core).
        working-directory: cli
        run: dart run tool/check_layers.dart --strict

      - name: Run monorepo quality gate
        run: just check

      - name: Verify local site output (act)
        if: ${{ env.ACT }}
        run: ls -la website/.vitepress/dist

      - name: Upload site artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: getglue-site
          path: website/.vitepress/dist
          if-no-files-found: error
