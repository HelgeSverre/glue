name: CI CLI Matrix OS

on:
  pull_request:
    paths:
      - "cli/**"
      - "packages/**"
      - ".github/workflows/ci-matrix-os.yml"
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install glue_core dependencies
        working-directory: packages/glue_core
        run: dart pub get

      - name: Install glue_strategies dependencies
        working-directory: packages/glue_strategies
        run: dart pub get

      - name: Install glue_harness dependencies
        working-directory: packages/glue_harness
        run: dart pub get

      - name: Install glue_server dependencies
        working-directory: packages/glue_server
        run: dart pub get

      - name: Install CLI dependencies
        working-directory: cli
        run: dart pub get

      - name: Generate build metadata
        # build_info_generated.dart is gitignored; tests in glue_harness/cli
        # import it transitively, so it must exist before any `dart test`.
        working-directory: cli
        run: dart run tool/gen_build_info.dart

      - name: Run glue_core tests
        working-directory: packages/glue_core
        run: dart test

      - name: Run glue_strategies tests
        working-directory: packages/glue_strategies
        # No package-local tests yet — provider coverage lives in cli/test/.
        run: |
          if [ -d test ]; then
            dart test
          else
            echo "glue_strategies: no test/ directory, skipping."
          fi

      - name: Run glue_harness tests
        working-directory: packages/glue_harness
        run: dart test

      - name: Run glue_server tests
        working-directory: packages/glue_server
        run: dart test

      - name: Run CLI tests
        working-directory: cli
        run: dart test
